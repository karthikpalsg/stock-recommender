name: Daily Stock Picks

# ============================================================
# Runs automatically Tuesday–Saturday at 6:15am AEST (Sydney)
# That equals Monday–Friday 8:15pm UTC — 15 min after US close
# Gives you time to review picks and place orders before work
# ============================================================

on:
  schedule:
    - cron: '15 20 * * 1-5'   # UTC: Mon–Fri 8:15pm = Tue–Sat 6:15am AEST

  # Lets you trigger a manual run anytime from GitHub website
  workflow_dispatch:

# Required so the workflow can commit the JSON history back to the repo
permissions:
  contents: write

jobs:
  run-stock-picks:
    runs-on: ubuntu-latest

    steps:
      # 1. Download your code from GitHub
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Install Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Install required libraries
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4. Write config.py using your GitHub Secrets
      #    (your real keys never touch GitHub — they're injected here at runtime)
      - name: Create config from secrets
        run: |
          cat > config.py << 'EOF'
          import os
          SLACK_WEBHOOK_URL  = os.environ.get('SLACK_WEBHOOK_URL', '')
          GMAIL_ADDRESS      = os.environ.get('GMAIL_ADDRESS', '')
          GMAIL_APP_PASSWORD = os.environ.get('GMAIL_APP_PASSWORD', '')
          FINNHUB_API_KEY    = os.environ.get('FINNHUB_API_KEY', '')
          SEND_EMAIL         = True
          SCORE_WEIGHTS = {
              'analyst':      0.35,
              'momentum':     0.25,
              'fundamentals': 0.25,
              'social':       0.15,
          }
          STOP_LOSS_PCT     = 8
          TARGET_RETURN_PCT = 20
          HOLD_MONTHS       = 6
          TOP_N_PICKS       = 5
          EOF

      # 5. Run the engine — secrets injected as environment variables
      - name: Run recommendation engine
        env:
          FINNHUB_API_KEY:    ${{ secrets.FINNHUB_API_KEY }}
          GMAIL_ADDRESS:      ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          SLACK_WEBHOOK_URL:  ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python run.py

      # 6. Commit the updated JSON history back to the repo
      #    This is what makes history accumulate across daily runs in the cloud.
      #    On the 1st of each month, the backup file is also committed here.
      - name: Commit JSON history to repo
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "GitHub Actions [Stock Bot]"
          git add data/
          git diff --staged --quiet && echo "No changes to commit" || \
            git commit -m "chore: stock history $(date '+%Y-%m-%d') [automated]"
          git push

      # 7. Save the picks report as a downloadable file in GitHub
      - name: Upload picks report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: stock-picks-${{ github.run_id }}
          path: picks/
          retention-days: 30   # keeps the last 30 days of reports
