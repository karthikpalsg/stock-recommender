<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="DG Stocks">
  <link rel="manifest" href="dashboard-manifest.json">
  <title>Data Glimpse Stocks</title>

  <!-- PIN gate — must be first script so body is hidden before content renders -->
  <script src="auth.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" crossorigin="anonymous" defer></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg:      #0d1117;
      --surface: #161b22;
      --card:    #1c2128;
      --card2:   #21262d;
      --border:  #30363d;
      --green:   #2ea043;
      --green-l: #3fb950;
      --amber:   #d29922;
      --amber-l: #e3b341;
      --red:     #da3633;
      --red-l:   #f85149;
      --muted:   #8b949e;
      --text:    #e6edf3;
      --radius:  12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      min-height: 100vh;
      padding-bottom: calc(env(safe-area-inset-bottom) + 24px);
      overscroll-behavior: none;
    }

    /* ─── Header ─────────────────────────────────────────────── */
    .header {
      background: rgba(22,27,34,0.88);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: calc(14px + env(safe-area-inset-top)) 16px 11px;
      position: -webkit-sticky;
      position: sticky;
      top: 0;
      z-index: 30;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .header-left h1 {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.4px;
      color: var(--text);
    }
    .header-left h1 em { color: var(--green-l); font-style: normal; }
    .header-subtitle {
      font-size: 11px;
      color: var(--muted);
      margin-top: 3px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .btn-update {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 14px;
      cursor: pointer;
      padding: 0;
      min-width: 36px;
      min-height: 36px;
      line-height: 1;
      opacity: 0.65;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
    }
    .btn-update:active { opacity: 1; }
    .btn-update.spinning {
      animation: btn-spin 0.7s linear infinite;
      pointer-events: none;
      opacity: 1;
    }
    @keyframes btn-spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .header-date { text-align: right; flex-shrink: 0; margin-left: 10px; }
    .date-primary   { font-size: 14px; font-weight: 800; color: var(--green-l); letter-spacing: -0.2px; line-height: 1.2; }
    .date-secondary { font-size: 10px; font-weight: 500; color: var(--muted); margin-top: 2px; }

    /* ─── Tab bar — pill style ────────────────────────────────── */
    .tab-bar-wrap {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 8px 10px;
      position: -webkit-sticky;
      position: sticky;
      top: 56px; /* fallback; JS overrides precisely via positionTabBar() */
      z-index: 29;
    }
    .tab-bar {
      display: flex;
      align-items: center;
      gap: 4px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .tab-bar::-webkit-scrollbar { display: none; }

    .tab-btn {
      flex-shrink: 0;
      padding: 5px 13px;
      font-size: 12px;
      font-weight: 600;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      white-space: nowrap;
      background: transparent;
      color: var(--muted);
      transition: background 0.12s, color 0.12s;
    }
    .tab-btn:active { opacity: 0.6; }
    .tab-btn.active { background: var(--green); color: #fff; }
    .tab-btn.archive { font-size: 11px; }
    .tab-sep { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; margin: 0 3px; }

    /* Dictionary pill */
    .tab-btn.dict        { color: var(--amber-l); }
    .tab-btn.dict.active { background: var(--amber); color: #fff; }

    /* ─── Run meta bar ───────────────────────────────────────── */
    .run-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 14px;
      font-size: 11px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    .run-meta-label { color: var(--green-l); font-weight: 700; }

    /* ─── 2-column stock grid ────────────────────────────────── */
    .stock-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 9px;
      padding: 10px 9px 6px;
    }
    /* 3 columns from 700px (tablet / small desktop) */
    @media (min-width: 700px) {
      .stock-grid { grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 12px 12px 8px; }
    }
    /* 4 columns from 1100px (full desktop) */
    @media (min-width: 1100px) {
      .stock-grid { grid-template-columns: repeat(4, 1fr); gap: 14px; padding: 14px 14px 10px; }
    }
    /* Table mode: collapse the grid so the table fills full width */
    .stock-grid.table-mode {
      display: block;
      padding: 0;
    }

    /* Card — left border strip per signal */
    .stock-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-left: 4px solid transparent;
      border-radius: var(--radius);
      padding: 10px 10px 8px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 0;
      transition: background 0.1s, opacity 0.1s;
      -webkit-user-select: none;
      user-select: none;
      position: relative;
    }
    .stock-card:active { background: var(--card2); opacity: 0.85; }

    /* ── Card internals ── */
    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    .card-rank {
      font-size: 9px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.2px;
    }
    .card-upside-badge {
      font-size: 9.5px;
      font-weight: 800;
      padding: 2px 6px;
      border-radius: 4px;
    }

    .card-ticker {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -0.8px;
      line-height: 1;
      margin-bottom: 2px;
      color: var(--text);
    }

    .card-signal {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.2px;
      margin-bottom: 8px;
      line-height: 1;
    }

    /* Score bar — thin strip above score row */
    .score-bar-bg {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      margin-bottom: 8px;
      overflow: hidden;
    }
    .score-bar-fill { height: 100%; border-radius: 2px; }

    /* Score + current price — same row, same colour, 24px */
    .card-score-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 4px;
    }
    .score-left       { display: flex; align-items: flex-end; gap: 5px; }
    .card-score       { font-size: 24px; font-weight: 900; letter-spacing: -1px; line-height: 1; }
    .card-score-label { font-size: 9px; color: var(--muted); font-weight: 600; margin-bottom: 2px; }
    .card-price-now   { font-size: 24px; font-weight: 900; letter-spacing: -1px; line-height: 1; }

    /* Target + stop row */
    .card-price {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 7px;
      letter-spacing: -0.1px;
    }
    .card-price .tv { color: var(--text); font-weight: 700; }
    .card-price .stop-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
    }
    .card-price .stop-value {
      font-size: 11px;
      font-weight: 800;
      color: var(--red-l);
    }

    /* ── Analyst summary section ────────────────────────── */
    .card-analyst {
      border-top: 1px solid var(--border);
      padding-top: 6px;
      margin-top: 4px;
      margin-bottom: 6px;
    }

    .analyst-moves {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 5px;
    }
    .analyst-up   { font-size: 13px; font-weight: 800; color: var(--green-l); letter-spacing: -0.2px; }
    .analyst-down { font-size: 13px; font-weight: 800; color: var(--red-l);   letter-spacing: -0.2px; }
    .analyst-period {
      font-size: 9px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .bullish-bar-bg {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 4px;
    }
    .bullish-bar-fill { height: 100%; border-radius: 2px; }

    .analyst-caption {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 9.5px;
      font-weight: 600;
      color: var(--muted);
      line-height: 1;
    }
    .analyst-caption .bullish-pct { font-weight: 800; font-size: 10px; }

    /* ── Source link buttons ── */
    .card-sources {
      display: flex;
      gap: 3px;
      margin-top: auto;
      padding-top: 6px;
      border-top: 1px solid var(--border);
    }
    .card-sources a {
      flex: 1;
      text-align: center;
      font-size: 8px;
      font-weight: 800;
      color: var(--muted);
      padding: 4px 2px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 4px;
      text-decoration: none;
      letter-spacing: 0.3px;
      line-height: 1;
    }
    .card-sources a:active { background: rgba(255,255,255,0.1); color: var(--text); }

    /* ── 8-K filing button ── */
    .filing-btn {
      font-size: 8px;
      font-weight: 800;
      padding: 4px 5px;
      border-radius: 4px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      color: var(--muted);
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.3px;
      line-height: 1;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 2px;
    }
    .filing-btn.bullish {
      background: rgba(63,185,80,0.12) !important;
      border-color: rgba(63,185,80,0.35) !important;
      color: #3fb950 !important;
    }
    .filing-btn.bearish {
      background: rgba(248,81,73,0.12) !important;
      border-color: rgba(248,81,73,0.35) !important;
      color: #f85149 !important;
    }
    .filing-btn.cautious {
      background: rgba(227,179,65,0.12) !important;
      border-color: rgba(227,179,65,0.35) !important;
      color: #e3b341 !important;
    }
    .filing-btn.neutral {
      opacity: 0.35 !important;
      cursor: not-allowed !important;
      pointer-events: none;
    }

    /* ── Filing modal overlay ── */
    .filing-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      z-index: 200;
      align-items: flex-end;
      justify-content: center;
      backdrop-filter: blur(4px);
    }
    .filing-overlay.open {
      display: flex;
      animation: fOverlayIn 0.15s ease;
    }
    @keyframes fOverlayIn { from { opacity:0 } to { opacity:1 } }
    .filing-sheet {
      background: #1c2128;
      border: 1px solid var(--border);
      border-radius: 18px 18px 0 0;
      width: 100%;
      max-width: 460px;
      padding: 20px 20px 40px;
      animation: fSheetUp 0.22s cubic-bezier(0.32,0.72,0,1);
    }
    @keyframes fSheetUp { from { transform:translateY(100%) } to { transform:translateY(0) } }
    .filing-handle {
      width: 36px; height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 18px;
    }
    .filing-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 16px;
    }
    .filing-title {
      font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
      text-transform: uppercase; color: var(--muted);
    }
    .filing-ticker {
      font-size: 22px; font-weight: 900;
      letter-spacing: -0.5px; line-height: 1.1;
    }
    .filing-close {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      color: var(--muted);
      width: 28px; height: 28px;
      border-radius: 50%;
      font-size: 14px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-family: inherit;
    }
    .filing-close:hover { background: rgba(255,255,255,0.1); color: var(--text); }
    .filing-score-row {
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 16px; padding: 14px 16px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border); border-radius: 10px;
    }
    .filing-score-circle {
      width: 56px; height: 56px; border-radius: 50%;
      border: 3px solid;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .filing-score-circle span { font-size: 18px; font-weight: 900; letter-spacing: -1px; }
    .filing-score-label { font-size: 12px; color: var(--muted); line-height: 1.4; }
    .filing-score-label strong {
      display: block; font-size: 14px; font-weight: 800;
      letter-spacing: -0.2px; margin-bottom: 2px;
    }
    .filing-detail {
      font-size: 13px; line-height: 1.55; color: var(--text);
      padding: 13px 15px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border); border-radius: 10px;
      margin-bottom: 14px;
    }
    .filing-detail-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.5px;
      text-transform: uppercase; color: var(--muted); margin-bottom: 6px;
    }
    .filing-date {
      font-size: 10px; color: var(--muted);
      text-align: right; letter-spacing: 0.2px;
    }
    .filing-bands { display: flex; gap: 4px; margin-top: 14px; }
    .filing-band { flex: 1; height: 3px; border-radius: 2px; }
    .filing-band-labels {
      display: flex; justify-content: space-between; margin-top: 5px;
    }
    .filing-band-labels span { font-size: 9px; color: var(--muted); }

    /* ─── Legend + Filter row ────────────────────────────────── */
    .legend-row {
      display: flex;
      align-items: center;
      padding: 7px 10px 6px;
      border-bottom: 1px solid var(--border);
      gap: 8px;
    }
    .legend-items {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      flex: 1;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 9px;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0.3px;
    }
    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* ── Filter toggle button ── */
    .filter-btn {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 5px;
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 10px 4px 8px;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
    }
    .filter-btn.active {
      background: rgba(63,185,80,0.12);
      border-color: rgba(63,185,80,0.4);
      color: var(--green-l);
    }

    /* ── View toggle button ── */
    .view-toggle-btn {
      flex-shrink: 0;
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 11px;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      cursor: pointer;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
      font-family: inherit;
    }
    .view-toggle-btn.active {
      background: rgba(88,166,255,0.12);
      border-color: rgba(88,166,255,0.4);
      color: #58a6ff;
    }

    /* ── Stock table view (dark, Option C style) ── */
    .stock-table-wrap {
      overflow: auto;                          /* both axes scroll inside wrapper */
      max-height: calc(100vh - 185px);         /* leaves room for header + tabs + legend */
      -webkit-overflow-scrolling: touch;
    }
    .stock-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 860px;
    }
    .stock-table thead th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      border-right: 1px solid rgba(48,54,61,0.5);
      padding: 8px 10px;
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      text-align: right;
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
    }
    .stock-table thead th:first-child,
    .stock-table thead th:nth-child(2),
    .stock-table thead th:nth-child(3),
    .stock-table thead th:nth-child(4) { text-align: left; }
    .stock-table thead th:hover { color: var(--text); background: var(--card); }
    .stock-table thead th.tbl-sorted { color: var(--green-l); background: rgba(63,185,80,0.07); }
    .stock-table thead th .th-sort { margin-left: 2px; font-size: 8px; }
    .stock-table tbody tr {
      border-left: 3px solid transparent;
      border-bottom: 1px solid rgba(48,54,61,0.6);
    }
    .stock-table tbody tr.tr-sb    { border-left-color: #3fb950; }
    .stock-table tbody tr.tr-buy   { border-left-color: #e3b341; }
    .stock-table tbody tr.tr-watch { border-left-color: #8b949e; }
    .stock-table tbody tr.tr-sell  { border-left-color: #f85149; }
    .stock-table tbody tr:hover { background: rgba(255,255,255,0.03); }
    .stock-table tbody td {
      padding: 7px 10px;
      font-size: 11px;
      color: var(--text);
      text-align: right;
      white-space: nowrap;
      border-right: 1px solid rgba(48,54,61,0.4);
    }
    .stock-table tbody td:first-child  { color: var(--muted); font-size: 10px; text-align: center; }
    .stock-table tbody td:nth-child(2) { font-weight: 900; font-size: 13px; text-align: left; font-family: 'SF Mono', Menlo, monospace; }
    .stock-table tbody td:nth-child(3) { text-align: left; color: var(--muted); font-size: 11px; }
    .stock-table tbody td:nth-child(4) { text-align: left; }
    .stock-table tbody td:last-child   { border-right: none; }
    .tbl-sig-sb    { color: #3fb950; font-size: 10px; font-weight: 700; }
    .tbl-sig-buy   { color: #e3b341; font-size: 10px; font-weight: 700; }
    .tbl-sig-watch { color: #8b949e; font-size: 10px; font-weight: 700; }
    .tbl-sig-sell  { color: #f85149; font-size: 10px; font-weight: 700; }
    .tbl-bar-wrap  { display: flex; align-items: center; gap: 5px; justify-content: flex-end; }
    .tbl-bar-bg    { width: 36px; height: 4px; background: var(--border); border-radius: 2px; flex-shrink: 0; }
    .tbl-bar-fill  { height: 100%; border-radius: 2px; }
    .tbl-score     { font-size: 12px; font-weight: 900; min-width: 26px; text-align: right; }

    /* ─── Filter panel ───────────────────────────────────────── */
    .filter-panel {
      background: var(--surface);
      border-bottom: 2px solid var(--border);
      padding: 10px 12px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .filter-panel.hidden { display: none; }

    /* ── Sticky control band (run-meta + legend + filter + result) ── */
    .sticky-controls {
      position: -webkit-sticky;
      position: sticky;
      top: 104px; /* fallback; JS overrides precisely via positionControls() */
      z-index: 8;
      background: var(--bg);
    }

    .filter-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .filter-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      min-width: 52px;
      flex-shrink: 0;
    }
    .filter-search {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 10px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      outline: none;
      -webkit-appearance: none;
    }
    .filter-search:focus { border-color: var(--green-l); }
    .filter-search::placeholder { color: var(--muted); font-weight: 400; }

    .filter-range {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 1;
    }
    .range-input {
      flex: 1;
      min-width: 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 8px;
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      text-align: center;
      outline: none;
      -webkit-appearance: none;
    }
    .range-input:focus { border-color: var(--green-l); }
    .range-input::placeholder { color: var(--muted); font-weight: 400; font-size: 12px; }
    .range-dash { font-size: 12px; color: var(--muted); font-weight: 700; flex-shrink: 0; }

    .filter-clear-btn {
      align-self: flex-end;
      margin-top: 2px;
      padding: 5px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
    }
    .filter-clear-btn.has-filters {
      border-color: rgba(248,81,73,0.4);
      background: rgba(248,81,73,0.08);
      color: var(--red-l);
    }

    /* ─── Result count bar ───────────────────────────────────── */
    .result-bar {
      padding: 5px 12px;
      font-size: 10px;
      font-weight: 700;
      color: var(--green-l);
      border-bottom: 1px solid var(--border);
      background: rgba(63,185,80,0.06);
      display: none;
    }
    .result-bar.visible { display: block; }

    /* ── Trend toggle pill (1M / 3M) ────────────────────────── */
    .trend-toggle {
      display: flex;
      align-items: center;
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2px;
      flex-shrink: 0;
    }
    .trend-opt {
      padding: 3px 10px;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      border-radius: 18px;
      border: none;
      background: transparent;
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
      white-space: nowrap;
    }
    .trend-opt.active { background: var(--green); color: #fff; }

    /* ── Sparkline ───────────────────────────────────────────── */
    .sparkline-wrap {
      margin-bottom: 7px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .sparkline-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .sparkline-label {
      font-size: 8.5px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .sparkline-return {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: -0.2px;
    }
    .sparkline-svg {
      width: 100%;
      height: 28px;
      display: block;
      overflow: visible;
    }

    /* ─── No-results empty state ─────────────────────────────── */
    .no-results {
      grid-column: 1 / -1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      gap: 10px;
      color: var(--muted);
      text-align: center;
    }
    .no-results-icon { font-size: 32px; }
    .no-results-text { font-size: 13px; line-height: 1.6; }
    .no-results-clear {
      margin-top: 4px;
      padding: 7px 18px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    /* ─── States ─────────────────────────────────────────────── */
    .state-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 24px;
      color: var(--muted);
      gap: 14px;
      text-align: center;
    }
    .state-box p { font-size: 14px; line-height: 1.7; }

    .spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--green-l);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green-l);
      animation: pulse 2.4s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }

    /* ─── Dictionary content wrapper ────────────────────────── */
    .dict-wrap {
      max-width: 640px;
      margin: 0 auto;
      padding: 20px 14px 48px;
    }
    .dict-section {
      margin-bottom: 0;
      padding-top: 22px;
      border-top: 1px solid var(--border);
    }
    .dict-section:first-child { border-top: none; padding-top: 0; }
    .dict-section-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.8px;
      text-transform: uppercase; color: var(--muted); margin-bottom: 8px;
    }
    .dict-h2 {
      font-size: 17px; font-weight: 800; letter-spacing: -0.3px;
      color: var(--text); margin-bottom: 8px;
    }
    .dict-p {
      font-size: 13px; color: var(--muted); line-height: 1.7; margin-bottom: 8px;
    }

    /* Card + callout side-by-side */
    .dict-card-stage {
      display: flex; gap: 12px; align-items: flex-start; margin: 14px 0 20px;
    }
    .dict-card-stage .stock-card {
      width: 162px; flex-shrink: 0; cursor: default; pointer-events: none;
    }
    .dict-callout-list {
      flex: 1; display: flex; flex-direction: column; gap: 7px; padding-top: 2px;
    }
    .dict-callout-item {
      display: flex; align-items: flex-start; gap: 7px;
      font-size: 11.5px; line-height: 1.4;
    }
    .dict-callout-num {
      width: 19px; height: 19px; border-radius: 50%;
      background: var(--muted); color: var(--bg);
      font-size: 9.5px; font-weight: 800;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .dict-callout-text { color: var(--muted); }
    .dict-callout-text strong { color: var(--text); font-weight: 700; }

    /* Metric breakdown table */
    .dict-table {
      width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 12.5px;
    }
    .dict-table th {
      text-align: left; font-size: 10px; font-weight: 700; letter-spacing: 0.5px;
      text-transform: uppercase; color: var(--muted);
      border-bottom: 2px solid var(--border); padding: 5px 8px;
    }
    .dict-table td {
      padding: 9px 8px; border-bottom: 1px solid var(--border); vertical-align: top;
    }
    .dict-table tr:last-child td { border-bottom: none; }
    .dict-table td:first-child { font-weight: 700; color: var(--text); width: 36%; }
    .dict-table td:last-child { color: var(--muted); line-height: 1.5; }

    /* Metric value chips — dark theme */
    .mv   { display:inline-block; background:var(--card2); border:1px solid var(--border); border-radius:4px; padding:1px 6px; font-family:monospace; font-size:11px; font-weight:700; color:var(--text); margin-bottom:2px; }
    .mv.g { background:rgba(46,160,67,0.15); border-color:rgba(63,185,80,0.3); color:#3fb950; }
    .mv.r { background:rgba(218,54,51,0.15); border-color:rgba(248,81,73,0.3); color:#f85149; }
    .mv.a { background:rgba(210,153,34,0.15); border-color:rgba(227,179,65,0.3); color:#e3b341; }

    /* Signal grid */
    .dict-signal-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px;
    }
    .dict-signal-item {
      background: var(--card); border: 1px solid var(--border);
      border-left: 4px solid; border-radius: 8px; padding: 10px;
    }
    .dict-signal-label { font-size: 11px; font-weight: 800; letter-spacing: 0.3px; margin-bottom: 2px; }
    .dict-signal-desc  { font-size: 11px; color: var(--muted); line-height: 1.4; }

    /* Run schedule grid */
    .dict-run-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px;
    }
    .dict-run-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px;
    }
    .dict-run-card h4 { font-size: 12px; font-weight: 800; color: var(--text); margin-bottom: 3px; }
    .dict-run-card p  { font-size: 11px; color: var(--muted); line-height: 1.5; }

    /* Setup steps */
    .dict-steps { margin-top: 12px; }
    .dict-step  { display: flex; gap: 10px; margin-bottom: 12px; align-items: flex-start; }
    .dict-step-num {
      width: 25px; height: 25px; border-radius: 50%;
      background: var(--card2); border: 2px solid var(--border);
      color: var(--text); font-size: 12px; font-weight: 800;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .dict-step-title { font-size: 13px; font-weight: 700; color: var(--text); display: block; margin-bottom: 1px; }
    .dict-step-desc  { font-size: 12px; color: var(--muted); }
    .dict-step-url   {
      display: inline-block; font-family: monospace; font-size: 10.5px;
      background: var(--card2); border: 1px solid var(--border);
      border-radius: 4px; padding: 2px 7px; margin-top: 3px;
      color: var(--text); word-break: break-all;
    }

    /* Disclaimer — dark amber */
    .dict-disclaimer {
      background: rgba(210,153,34,0.1); border: 1px solid rgba(227,179,65,0.25); border-radius: 8px;
      padding: 12px 14px; margin-top: 12px;
      font-size: 11.5px; color: var(--amber-l); line-height: 1.6;
    }

    /* ─── News link button (card sources) ───────────────────────── */
    .news-link {
      flex: 1;
      text-align: center;
      font-size: 8px;
      font-weight: 800;
      color: var(--muted);
      padding: 4px 2px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 4px;
      text-decoration: none;
      letter-spacing: 0.3px;
      line-height: 1;
    }
    .news-link:active { background: rgba(255,255,255,0.1); color: var(--text); }
    .news-link.buy-news {
      background: rgba(63,185,80,0.08);
      border-color: rgba(63,185,80,0.25);
      color: var(--green-l);
    }
    .news-link.avoid-news {
      background: rgba(248,81,73,0.08);
      border-color: rgba(248,81,73,0.25);
      color: var(--red-l);
    }

    /* ─── Summary button in run-meta ─────────────────────────────── */
    .summary-meta-btn {
      background: rgba(63,185,80,0.1);
      border: 1px solid rgba(63,185,80,0.3);
      border-radius: 12px;
      color: var(--green-l);
      font-size: 10px;
      font-weight: 700;
      padding: 3px 10px;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.2px;
      white-space: nowrap;
    }
    .summary-meta-btn:active { opacity: 0.7; }

    /* ─── Summary modal overlay ──────────────────────────────────── */
    .summary-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 300;
      align-items: flex-end;
      justify-content: center;
      backdrop-filter: blur(6px);
    }
    .summary-overlay.open {
      display: flex;
      animation: fOverlayIn 0.15s ease;
    }
    .summary-sheet {
      background: #1c2128;
      border: 1px solid var(--border);
      border-radius: 18px 18px 0 0;
      width: 100%;
      max-width: 640px;
      max-height: 88vh;
      overflow-y: auto;
      padding: 20px 18px 32px;
      -webkit-overflow-scrolling: touch;
    }
    @media (min-width: 700px) {
      .summary-overlay { align-items: center; padding: 24px; }
      .summary-sheet { border-radius: 18px; max-height: 85vh; }
    }
    .summary-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 14px;
    }
    .summary-title {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: var(--muted);
    }
    .summary-date {
      font-size: 18px;
      font-weight: 900;
      letter-spacing: -0.3px;
      color: var(--text);
      margin-top: 2px;
    }
    .summary-close {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      color: var(--muted);
      width: 28px; height: 28px;
      border-radius: 50%;
      font-size: 14px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-family: inherit;
    }
    .summary-close:hover { background: rgba(255,255,255,0.1); color: var(--text); }
    .summary-section-title {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: var(--muted);
      margin: 14px 0 8px;
      padding-bottom: 5px;
      border-bottom: 1px solid var(--border);
    }
    .summary-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(48,54,61,0.5);
    }
    .summary-row:last-child { border-bottom: none; }
    .summary-ticker {
      font-size: 16px;
      font-weight: 900;
      letter-spacing: -0.3px;
    }
    .summary-score-badge {
      font-size: 13px;
      font-weight: 900;
      letter-spacing: -0.5px;
      margin-top: 2px;
    }
    .summary-meta {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .summary-signal {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }
    .summary-prices {
      font-size: 12px;
      color: var(--muted);
    }
    .sp-cur { color: var(--text); font-weight: 700; }
    .sp-tgt { color: var(--green-l); font-weight: 700; }
    .sp-neg { color: var(--red-l);   font-weight: 700; }
    /* Thesis: hidden on mobile, visible on desktop */
    .summary-thesis {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.5;
      margin-top: 1px;
      display: none;
    }
    @media (min-width: 700px) {
      .summary-thesis { display: block; }
    }
    .summary-news-link {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 9.5px;
      font-weight: 700;
      color: var(--muted);
      text-decoration: none;
      padding: 3px 8px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: rgba(255,255,255,0.04);
      margin-top: 4px;
      width: fit-content;
    }
    .summary-news-link.buy  { color: var(--green-l); border-color: rgba(63,185,80,0.3);  background: rgba(63,185,80,0.07);  }
    .summary-news-link.sell { color: var(--red-l);   border-color: rgba(248,81,73,0.3);  background: rgba(248,81,73,0.07);  }
    .summary-download-btn {
      width: 100%;
      margin-top: 18px;
      padding: 11px;
      border-radius: 10px;
      border: 1px solid rgba(63,185,80,0.3);
      background: rgba(63,185,80,0.1);
      color: var(--green-l);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.2px;
    }
    .summary-download-btn:active { opacity: 0.7; }
    .summary-download-btn:disabled { opacity: 0.5; cursor: default; }
    .summary-disclaimer {
      font-size: 10px;
      color: var(--muted);
      text-align: center;
      margin-top: 12px;
      line-height: 1.5;
    }

    /* ─── Recommendation tab button ─────────────────────────── */
    .tab-btn.rec-tab        { color: var(--green-l); font-weight: 700; }
    .tab-btn.rec-tab.active { background: var(--green); color: #fff; }

    /* ─── Recommendation view ────────────────────────────────── */
    .rec-wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 14px 10px 48px;
    }
    .rec-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 14px;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .rec-header-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.6px;
      text-transform: uppercase; color: var(--green-l); margin-bottom: 4px;
    }
    .rec-header-date { font-size: 18px; font-weight: 900; letter-spacing: -0.3px; color: var(--text); }
    .rec-header-sub  { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .rec-dl-btn {
      background: rgba(63,185,80,0.1); border: 1px solid rgba(63,185,80,0.3);
      border-radius: 8px; color: var(--green-l); font-size: 16px;
      cursor: pointer; padding: 8px 12px; font-family: inherit; flex-shrink: 0;
    }
    .rec-dl-btn:active { opacity: 0.7; }
    .rec-dl-btn:disabled { opacity: 0.45; cursor: default; }
    .rec-section-title {
      font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
      text-transform: uppercase; color: var(--muted);
      padding: 5px 2px; margin-bottom: 8px; border-bottom: 1px solid var(--border);
    }
    .rec-list { display: flex; flex-direction: column; gap: 10px; }
    @media (min-width: 1100px) {
      .rec-list { display: grid; grid-template-columns: repeat(2, 1fr); }
    }
    .rec-card {
      background: var(--card); border: 1px solid var(--border);
      border-left: 4px solid transparent; border-radius: var(--radius); padding: 12px 14px;
    }
    .rec-card-top {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;
    }
    .rec-rank-badge { font-size: 11px; font-weight: 700; display: flex; align-items: center; gap: 5px; }
    .rec-rank-move {
      font-size: 10px; font-weight: 700; padding: 1px 5px; border-radius: 3px;
    }
    .rec-rank-move.up   { background: rgba(63,185,80,0.15); color: #3fb950; }
    .rec-rank-move.down { background: rgba(248,81,73,0.15);  color: #f85149; }
    .rec-rank-move.flat { color: var(--muted); }
    .rec-signal-badge { font-size: 10px; font-weight: 700; letter-spacing: 0.2px; }
    .rec-card-main {
      display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px;
    }
    .rec-ticker  { font-size: 28px; font-weight: 900; letter-spacing: -1px; line-height: 1; }
    .rec-company { font-size: 11px; color: var(--muted); margin-top: 3px; line-height: 1.3; max-width: 180px; }
    @media (min-width: 700px) { .rec-company { max-width: none; } }
    .rec-price-block { text-align: right; }
    .rec-current-price { font-size: 22px; font-weight: 900; letter-spacing: -0.5px; line-height: 1; color: var(--text); }
    .rec-score-label   { font-size: 10px; color: var(--muted); margin-top: 3px; }
    .rec-price-row {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      margin-bottom: 8px; font-size: 12px; color: var(--muted);
    }
    .rec-target { color: var(--text); font-weight: 700; }
    .rec-upside { font-weight: 800; }
    .rec-stop strong { color: var(--red-l); }
    .rec-rr     { color: var(--muted); font-size: 10px; }
    .rec-analyst-bar { margin-bottom: 8px; }
    .rec-analyst-bg  { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; margin-bottom: 4px; }
    .rec-analyst-fill { height: 100%; border-radius: 2px; }
    .rec-analyst-labels {
      display: flex; justify-content: space-between;
      font-size: 10px; color: var(--muted); font-weight: 600;
    }
    /* Thesis hidden mobile, shown desktop */
    .rec-thesis {
      font-size: 12px; color: var(--muted); line-height: 1.5; margin-bottom: 8px; display: none;
    }
    @media (min-width: 700px) { .rec-thesis { display: block; } }
    .rec-sell-reason {
      font-size: 12px; color: var(--muted); line-height: 1.5; margin-bottom: 8px;
      padding: 8px 10px;
      background: rgba(248,81,73,0.06); border: 1px solid rgba(248,81,73,0.15); border-radius: 6px;
    }
    .rec-actions {
      display: flex; align-items: center; gap: 6px;
      padding-top: 8px; border-top: 1px solid var(--border); flex-wrap: wrap;
    }
    .rec-news-btn {
      font-size: 10px; font-weight: 700; padding: 4px 10px; border-radius: 5px;
      text-decoration: none; letter-spacing: 0.2px; flex: 1; text-align: center; min-width: 140px;
    }
    .rec-news-btn.buy  { background: rgba(63,185,80,0.1); border: 1px solid rgba(63,185,80,0.3); color: var(--green-l); }
    .rec-news-btn.sell { background: rgba(248,81,73,0.1); border: 1px solid rgba(248,81,73,0.3); color: var(--red-l);   }
    .rec-src-links { display: flex; gap: 4px; }
    .rec-src-links a {
      font-size: 9px; font-weight: 800; padding: 4px 7px;
      border: 1px solid var(--border); border-radius: 4px;
      color: var(--muted); text-decoration: none; background: rgba(255,255,255,0.04);
    }
    .rec-src-links a:active { background: rgba(255,255,255,0.1); color: var(--text); }
    .rec-empty      { color: var(--muted); font-size: 12px; padding: 12px 4px; font-style: italic; }
    .rec-disclaimer {
      font-size: 10px; color: var(--muted); text-align: center;
      margin-top: 20px; padding-top: 14px; border-top: 1px solid var(--border); line-height: 1.5;
    }
    /* Cross-run comparison mini-table */
    .rec-compare { overflow-x: auto; margin-bottom: 10px; -webkit-overflow-scrolling: touch; }
    .rec-compare-tbl {
      width: 100%; border-collapse: collapse; font-size: 10px; min-width: 260px;
    }
    .rec-compare-tbl th {
      text-align: right; padding: 3px 7px;
      font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px;
      color: var(--muted); border-bottom: 1px solid var(--border); white-space: nowrap;
    }
    .rec-compare-tbl th:first-child { text-align: left; }
    .rec-compare-tbl th.latest-col  { color: var(--text); }
    .rec-compare-tbl td {
      text-align: right; padding: 4px 7px;
      font-size: 10px; color: var(--muted);
      border-bottom: 1px solid rgba(48,54,61,0.4); white-space: nowrap;
    }
    .rec-compare-tbl td:first-child {
      text-align: left; font-weight: 700; font-size: 9px;
      text-transform: uppercase; letter-spacing: 0.3px;
    }
    .rec-compare-tbl td.latest-col { color: var(--text); font-weight: 800; }
    .rec-compare-tbl td.up-val     { color: #3fb950; }
    .rec-compare-tbl td.down-val   { color: #f85149; }
    .rec-compare-tbl tr:last-child td { border-bottom: none; }
    /* Analytical write-up text */
    .rec-writeup {
      font-size: 12.5px; color: var(--muted); line-height: 1.65; margin-bottom: 10px;
    }
    .rec-writeup strong { color: var(--text); font-weight: 700; }
  </style>
</head>
<body>

  <!-- ── Header ──────────────────────────────────────────────── -->
  <div class="header" id="header">
    <div class="header-left">
      <h1>📈 Data Glimpse <em>Stocks</em></h1>
      <div class="header-subtitle">
        <span class="dot"></span>
        <span id="subtitle-text">Loading…</span>
        <button class="btn-update" id="btn-update" onclick="manualRefresh()" title="Refresh now">↻</button>
      </div>
    </div>
    <div class="header-date">
      <div class="date-primary"   id="date-primary">—</div>
      <div class="date-secondary" id="date-secondary">—</div>
    </div>
  </div>

  <!-- ── Tab bar ─────────────────────────────────────────────── -->
  <div class="tab-bar-wrap" id="tab-bar-wrap">
    <div class="tab-bar" id="tab-bar">
      <div style="padding:11px 8px;color:var(--muted);font-size:11px">Loading…</div>
    </div>
  </div>

  <!-- ── Content ─────────────────────────────────────────────── -->
  <div id="content">
    <div class="state-box">
      <div class="spinner"></div>
      <p>Fetching stock picks…</p>
    </div>
  </div>


<script>
  // ── Config ──────────────────────────────────────────────────────────────
  const DATA_URL      = 'https://raw.githubusercontent.com/karthikpalsg/stock-recommender/main/data/history.json';
  const POLL_INTERVAL = 5 * 60 * 1000;  // poll every 5 min

  // External source URLs per ticker
  const SRC = {
    YF:   t => `https://finance.yahoo.com/quote/${t}`,           // price, news, analyst ratings, financials
    FV:   t => `https://finviz.com/quote.ashx?t=${t}`,           // chart, ratios, insider trades, news
    SA:   t => `https://seekingalpha.com/symbol/${t}`,           // analyst articles & buy/sell ratings
  };

  // Google News search URL — sentiment-aware per signal
  function getNewsLink(ticker, signal) {
    const isBuy   = signal === 'STRONG BUY' || signal === 'BUY';
    const isAvoid = signal === 'AVOID';
    const q = isBuy
      ? `${ticker} stock analyst upgrade buy`
      : isAvoid
        ? `${ticker} stock analyst downgrade sell`
        : `${ticker} stock analyst`;
    return `https://www.google.com/search?q=${encodeURIComponent(q)}&tbm=nws&tbs=qdr:w`;
  }

  function newsLinkHTML(ticker, signal) {
    const url     = getNewsLink(ticker, signal);
    const isBuy   = signal === 'STRONG BUY' || signal === 'BUY';
    const isAvoid = signal === 'AVOID';
    const cls     = isBuy ? 'news-link buy-news' : isAvoid ? 'news-link avoid-news' : 'news-link';
    const label   = isBuy ? '📰+' : isAvoid ? '📰–' : '📰';
    const title   = isBuy ? 'Positive analyst news (7d)' : isAvoid ? 'Negative analyst news (7d)' : 'News (7d)';
    return `<a href="${url}" target="_blank" rel="noopener" class="${cls}" title="${title}">${label}</a>`;
  }

  // Signal → accent colour
  const SIG_COLOR = {
    'STRONG BUY': 'var(--green-l)',
    'BUY':        'var(--amber-l)',
    'WATCH':      'var(--muted)',
    'AVOID':      'var(--red-l)',
  };
  // Raw hex values for border-left (CSS variables don't work in inline border shorthand on older WebKit)
  const SIG_HEX = {
    'STRONG BUY': '#3fb950',
    'BUY':        '#e3b341',
    'WATCH':      '#8b949e',
    'AVOID':      '#f85149',
  };
  // Local emoji map — ignores signal_emoji from data (which sometimes contains full label text)
  const SIG_EMOJI = {
    'STRONG BUY': '🟢',
    'BUY':        '🟡',
    'WATCH':      '⚪',
    'AVOID':      '🔴',
  };

  // ── State ───────────────────────────────────────────────────────────────
  let allRuns     = [];
  let tabMeta     = [];
  let activeTabId = null;
  let lastRunId   = null;
  let lastFetchAt = null;
  let currentRun  = null;   // run currently displayed
  let filterOpen  = false;  // filter panel visibility
  let filterState = { ticker: '', priceMin: '', priceMax: '' }; // persists across tab switches
  let trendMode   = '1m';   // sparkline window: '1m' | '3m'
  let viewMode    = 'cards';          // 'cards' | 'table'
  let tableSort   = { col: 4, desc: true };

  // ── Boot ────────────────────────────────────────────────────────────────
  window.addEventListener('load', () => {
    positionTabBar();
    new ResizeObserver(() => { positionTabBar(); positionControls(); })
      .observe(document.getElementById('header'));
    window.addEventListener('resize', positionTableWrap);
    fetchData();
    setInterval(fetchData,      POLL_INTERVAL);
    setInterval(updateSubtitle, 30_000);
  });

  function positionTabBar() {
    document.getElementById('tab-bar-wrap').style.top =
      document.getElementById('header').offsetHeight + 'px';
  }

  // Sticks the run-meta + legend row + filter + result band just below the tab bar
  function positionControls() {
    const header  = document.getElementById('header');
    const tabBar  = document.getElementById('tab-bar-wrap');
    const ctrl    = document.getElementById('sticky-controls');
    if (!ctrl || !header || !tabBar) return;
    ctrl.style.top = (header.offsetHeight + tabBar.offsetHeight) + 'px';
    positionTableWrap();   // recalculate table height whenever controls move
  }

  // Sizes the table scroll container to exactly fill the remaining viewport
  function positionTableWrap() {
    const wrap = document.querySelector('.stock-table-wrap');
    if (!wrap) return;
    const header = document.getElementById('header');
    const tabBar = document.getElementById('tab-bar-wrap');
    const ctrl   = document.getElementById('sticky-controls');
    const used   = (header?.offsetHeight || 0)
                 + (tabBar?.offsetHeight  || 0)
                 + (ctrl?.offsetHeight    || 0);
    wrap.style.maxHeight = (window.innerHeight - used) + 'px';
  }

  // ── Fetch ────────────────────────────────────────────────────────────────
  async function fetchData(force = false) {
    try {
      const res  = await fetch(DATA_URL + '?_=' + Date.now());
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      lastFetchAt = Date.now();
      allRuns     = (data.runs || []).slice();

      if (force || data.last_run !== lastRunId) {
        lastRunId = data.last_run;
        buildUI();
      }
      updateSubtitle();
    } catch (e) {
      setSubtitleText('Could not load — check connection');
    }
  }

  // ── Month boundary ────────────────────────────────────────────────────────
  function getMonthStartDateStr() {
    // Returns 'YYYY-MM-01' in Sydney time — the first day of the current month
    const syd = new Date().toLocaleDateString('en-CA', { timeZone: 'Australia/Sydney' });
    return syd.slice(0, 8) + '01';
  }

  // ── Build tabs + content ──────────────────────────────────────────────────
  function buildUI() {
    if (!allRuns.length) {
      showEmpty('No runs yet. The engine runs automatically at 5am, 7am and 12pm Sydney time on weekdays.');
      return;
    }

    const monthStart = getMonthStartDateStr();
    const monthRuns  = [];
    const monthBest  = {};

    allRuns.forEach(run => {
      if (run.run_date >= monthStart) {
        monthRuns.push(run);           // current month → individual day tabs
      } else {
        const mk = run.run_date.slice(0, 7);
        if (!monthBest[mk] || run.run_id > monthBest[mk].run_id) monthBest[mk] = run;
      }
    });

    // Deduplicate by date — keep the latest run per day (handles legacy multi-run days)
    const dayBest = {};
    monthRuns.forEach(run => {
      if (!dayBest[run.run_date] || run.run_id > dayBest[run.run_date].run_id)
        dayBest[run.run_date] = run;
    });
    const dedupedMonth = Object.values(dayBest).sort((a, b) => b.run_date.localeCompare(a.run_date));

    const archiveKeys = Object.keys(monthBest).sort().reverse();
    buildTabs(dedupedMonth, archiveKeys, monthBest);
  }

  // ── Tabs ──────────────────────────────────────────────────────────────────
  function buildTabs(weekRuns, archiveKeys, monthBest) {
    tabMeta = [];

    // Recommendation tab always first — always shows the latest run
    tabMeta.push({ id: 'rec', label: '📋 Today', type: 'rec' });

    weekRuns.forEach(run => {
      tabMeta.push({ id: 'w-' + run.run_date, label: dayTabLabel(run.run_date), run, type: 'week' });
    });

    archiveKeys.forEach(mk => {
      const [y, m] = mk.split('-');
      tabMeta.push({ id: 'a-' + mk, label: archiveTabLabel(mk), run: monthBest[mk], type: 'archive', monthKey: mk });
    });

    const bar = document.getElementById('tab-bar');
    bar.innerHTML = '';
    tabMeta.forEach((tab, i) => {
      // Separator after the rec tab
      if (i === 1 && tabMeta[0]?.type === 'rec') {
        const sep = document.createElement('div');
        sep.className = 'tab-sep';
        bar.appendChild(sep);
      }
      // Separator before archive tabs (only when previous is a week tab)
      if (i > 0 && tab.type === 'archive' && tabMeta[i-1].type === 'week') {
        const sep = document.createElement('div');
        sep.className = 'tab-sep';
        bar.appendChild(sep);
      }
      const btn = document.createElement('button');
      btn.className = 'tab-btn'
        + (tab.type === 'archive' ? ' archive' : '')
        + (tab.type === 'rec'     ? ' rec-tab'  : '');
      btn.dataset.id = tab.id;
      btn.textContent = tab.label;
      btn.onclick = () => selectTab(tab.id);
      bar.appendChild(btn);
    });

    // Always append Dictionary tab at the far right
    const dictSep = document.createElement('div');
    dictSep.className = 'tab-sep';
    bar.appendChild(dictSep);
    const dictBtn = document.createElement('button');
    dictBtn.className = 'tab-btn dict';
    dictBtn.dataset.id = 'dictionary';
    dictBtn.textContent = '📖 Dictionary';
    dictBtn.onclick = () => selectTab('dictionary');
    bar.appendChild(dictBtn);
    tabMeta.push({ id: 'dictionary', label: '📖 Dictionary', type: 'dictionary' });

    // Restore active tab — but never auto-restore to Dictionary on data refresh
    const restore = (activeTabId && activeTabId !== 'dictionary' && tabMeta.find(t => t.id === activeTabId))
                    ? activeTabId : tabMeta[0]?.id;
    if (restore) selectTab(restore);
  }

  function selectTab(id) {
    const tab = tabMeta.find(t => t.id === id);
    if (!tab) return;
    activeTabId = id;

    document.querySelectorAll('.tab-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.id === id)
    );

    const btn = document.querySelector(`.tab-btn[data-id="${id}"]`);
    btn?.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });

    updateHeaderDate(tab);
    if (tab.type === 'rec') {
      renderRecommendation();
    } else if (tab.type === 'dictionary') {
      renderDictionary();
    } else {
      renderRun(tab.run);
    }
  }

  // ── Header date ───────────────────────────────────────────────────────────
  function updateHeaderDate(tab) {
    const p = document.getElementById('date-primary');
    const s = document.getElementById('date-secondary');

    if (tab.type === 'rec') {
      p.textContent = '📋 Recommendation';
      s.textContent = 'Latest run · current picks';
    } else if (tab.type === 'dictionary') {
      p.textContent = '📖 Dictionary';
      s.textContent = 'How to read your picks';
    } else if (tab.type === 'archive') {
      const [y, m] = tab.monthKey.split('-');
      const dt = new Date(Number(y), Number(m) - 1);
      p.textContent = dt.toLocaleDateString('en-AU', { month: 'long', year: 'numeric' });
      s.textContent = 'Monthly Archive';
    } else {
      const dt = new Date(tab.run.run_date + 'T12:00:00');
      p.textContent = dt.toLocaleDateString('en-AU', { weekday: 'long', day: 'numeric', month: 'long' });
      s.textContent = tab.run.run_label || tab.run.run_time?.slice(0, 5) || '';
    }
  }

  // ── Render 3-column grid ──────────────────────────────────────────────────
  function renderRun(run) {
    const el = document.getElementById('content');
    if (!run?.stocks?.length) {
      el.innerHTML = '<div class="state-box"><p>No stock data for this run.</p></div>';
      return;
    }

    currentRun = run;

    el.innerHTML = `
      <div class="sticky-controls" id="sticky-controls">
        <div class="run-meta">
          <span>${run.total_stocks} stocks &middot; ${run.run_date}</span>
          <div style="display:flex;align-items:center;gap:8px">
            <button class="summary-meta-btn" onclick="openSummaryModal()">📊 Brief</button>
            <span class="run-meta-label">${run.run_label ?? 'Run'}</span>
          </div>
        </div>
        <div class="legend-row">
          <div class="legend-items">
            <div class="legend-item"><div class="legend-dot" style="background:#3fb950"></div>STRONG BUY</div>
            <div class="legend-item"><div class="legend-dot" style="background:#e3b341"></div>BUY</div>
            <div class="legend-item"><div class="legend-dot" style="background:#8b949e"></div>WATCH</div>
            <div class="legend-item"><div class="legend-dot" style="background:#f85149"></div>AVOID</div>
          </div>
          <div class="trend-toggle">
            <button class="trend-opt ${trendMode==='1m'?'active':''}" id="trend-1m" onclick="setTrend('1m')">1M</button>
            <button class="trend-opt ${trendMode==='3m'?'active':''}" id="trend-3m" onclick="setTrend('3m')">3M</button>
          </div>
          <button class="view-toggle-btn${viewMode==='table'?' active':''}" id="view-toggle-btn" onclick="toggleView()">
            ${viewMode==='table' ? '⊞ Cards' : '☰ Table'}
          </button>
          <button class="filter-btn" id="filter-btn" onclick="toggleFilter()">
            <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor">
              <path d="M1 2.5A1.5 1.5 0 0 1 2.5 1h11A1.5 1.5 0 0 1 15 2.5v1.586a1.5 1.5 0 0 1-.44 1.06L9.5 10.207V14.5a.5.5 0 0 1-.777.416L5.723 13A.5.5 0 0 1 5.5 12.582V10.207L1.44 5.146A1.5 1.5 0 0 1 1 4.086V2.5z"/>
            </svg>
            Filter
          </button>
        </div>
        <div class="filter-panel hidden" id="filter-panel">
          <div class="filter-row">
            <span class="filter-label">Ticker</span>
            <input class="filter-search" id="f-ticker" type="text"
                   placeholder="e.g. DDOG, NVDA" autocomplete="off" autocapitalize="characters"
                   oninput="this.value=this.value.toUpperCase(); applyFilters()">
          </div>
          <div class="filter-row">
            <span class="filter-label">Price $</span>
            <div class="filter-range">
              <input class="range-input" id="f-price-min" type="number"
                     placeholder="Min" min="0" oninput="applyFilters()">
              <span class="range-dash">—</span>
              <input class="range-input" id="f-price-max" type="number"
                     placeholder="Max" min="0" oninput="applyFilters()">
            </div>
          </div>
          <button class="filter-clear-btn" id="clear-btn" onclick="clearFilters()">Clear filters</button>
        </div>
        <div class="result-bar" id="result-bar"></div>
      </div>
      <div class="stock-grid" id="stock-grid"></div>`;

    // Restore persisted filter values and panel state across tab switches
    const ftEl  = document.getElementById('f-ticker');
    const fminEl = document.getElementById('f-price-min');
    const fmaxEl = document.getElementById('f-price-max');
    if (ftEl)   ftEl.value   = filterState.ticker;
    if (fminEl) fminEl.value = filterState.priceMin;
    if (fmaxEl) fmaxEl.value = filterState.priceMax;
    if (filterOpen) {
      document.getElementById('filter-panel')?.classList.remove('hidden');
      document.getElementById('filter-btn')?.classList.add('active');
    }

    applyFilters();
    positionControls();   // pin the control band below header + tab bar
  }

  // Opens Yahoo Finance (primary action — whole card tap)
  function openStock(ticker) {
    window.open(SRC.YF(ticker), '_blank', 'noopener');
  }

  // ── Filter ────────────────────────────────────────────────────────────────
  function toggleFilter() {
    filterOpen = !filterOpen;
    document.getElementById('filter-panel')?.classList.toggle('hidden', !filterOpen);
    document.getElementById('filter-btn')?.classList.toggle('active', filterOpen);
  }

  function applyFilters() {
    if (!currentRun?.stocks?.length) return;

    const rawTicker = (document.getElementById('f-ticker')?.value || '').toUpperCase();
    const tickers   = rawTicker.split(/[\s,]+/).map(t => t.trim()).filter(Boolean);
    const priceMin  = parseFloat(document.getElementById('f-price-min')?.value) || 0;
    const priceMax  = parseFloat(document.getElementById('f-price-max')?.value) || Infinity;
    const hasFilter = tickers.length > 0 || priceMin > 0 || priceMax < Infinity;

    // Persist current filter values so they survive tab switches
    filterState.ticker   = document.getElementById('f-ticker')?.value   || '';
    filterState.priceMin = document.getElementById('f-price-min')?.value || '';
    filterState.priceMax = document.getElementById('f-price-max')?.value || '';

    // Highlight clear button when filters are set
    document.getElementById('clear-btn')?.classList.toggle('has-filters', hasFilter);

    const stocks = hasFilter
      ? currentRun.stocks.filter(s => {
          if (tickers.length > 0 && !tickers.includes(s.ticker)) return false;
          if (s.price != null && (s.price < priceMin || s.price > priceMax)) return false;
          return true;
        })
      : currentRun.stocks;

    // Result bar
    const rb = document.getElementById('result-bar');
    if (rb) {
      if (hasFilter) {
        rb.textContent = `Showing ${stocks.length} of ${currentRun.stocks.length} stocks`;
        rb.classList.add('visible');
      } else {
        rb.classList.remove('visible');
      }
    }

    renderGrid(stocks, hasFilter);
  }

  function clearFilters() {
    const t = document.getElementById('f-ticker');
    const mn = document.getElementById('f-price-min');
    const mx = document.getElementById('f-price-max');
    if (t)  t.value  = '';
    if (mn) mn.value = '';
    if (mx) mx.value = '';
    filterState = { ticker: '', priceMin: '', priceMax: '' };
    applyFilters();
  }

  // ── Trend toggle ─────────────────────────────────────────────────────────
  function setTrend(mode) {
    trendMode = mode;
    document.getElementById('trend-1m')?.classList.toggle('active', mode === '1m');
    document.getElementById('trend-3m')?.classList.toggle('active', mode === '3m');
    applyFilters();  // re-render all cards with new sparkline window
  }

  // ── Build SVG sparkline from a price array ────────────────────────────────
  function buildSparkline(prices) {
    if (!prices || prices.length < 2) return '';
    const W = 200, H = 28;
    const min   = Math.min(...prices);
    const max   = Math.max(...prices);
    const range = max - min || 1;
    const n     = prices.length;
    const isUp  = prices[n - 1] >= prices[0];
    const line  = isUp ? '#3fb950' : '#f85149';
    const fill  = isUp ? 'rgba(63,185,80,0.08)' : 'rgba(248,81,73,0.08)';

    const pts = prices.map((p, i) => [
      (i / (n - 1)) * W,
      H - ((p - min) / range) * (H - 4) - 2
    ]);

    const poly = pts.map(([x, y]) => `${x.toFixed(1)},${y.toFixed(1)}`).join(' ');
    const area = [
      `M ${pts[0][0].toFixed(1)},${H}`,
      ...pts.map(([x, y]) => `L ${x.toFixed(1)},${y.toFixed(1)}`),
      `L ${pts[n-1][0].toFixed(1)},${H}`, 'Z'
    ].join(' ');
    const [lx, ly] = pts[n - 1];

    const ret    = ((prices[n-1] - prices[0]) / prices[0] * 100);
    const retStr = `${ret >= 0 ? '+' : ''}${ret.toFixed(1)}%`;
    const label  = trendMode === '1m' ? '1 month' : '3 months';

    return `
      <div class="sparkline-wrap">
        <div class="sparkline-header">
          <span class="sparkline-label">${label}</span>
          <span class="sparkline-return" style="color:${line}">${retStr}</span>
        </div>
        <svg class="sparkline-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
          <path d="${area}" fill="${fill}" />
          <polyline points="${poly}" fill="none" stroke="${line}"
            stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
          <circle cx="${lx.toFixed(1)}" cy="${ly.toFixed(1)}" r="2.5" fill="${line}" />
        </svg>
      </div>`;
  }

  // ── 8-K filing button HTML helper ────────────────────────────────────────
  function filingBtnHTML(s) {
    const fs = s.scores?.filing;
    const fd = (s.signal_details?.filing || '').trim();
    // Real filings have detail prefixed "8-K YYYY-MM-DD: reason..."
    const m = fd.match(/^(8-K \d{4}-\d{2}-\d{2}):\s*([\s\S]*)/);
    if (!m || fs == null) {
      return `<button class="filing-btn neutral" title="No recent 8-K">📄 —</button>`;
    }
    const dateLabel  = m[1];
    const reason     = m[2];
    const cls        = fs >= 60 ? 'bullish' : fs < 35 ? 'bearish' : 'cautious';
    const safeDate   = dateLabel.replace(/"/g, '&quot;');
    const safeReason = reason.replace(/"/g, '&quot;');
    return `<button class="filing-btn ${cls}"
      data-ticker="${s.ticker}"
      data-score="${fs}"
      data-date="${safeDate}"
      data-reason="${safeReason}"
      onclick="openFilingModal(this)">📄 ${Math.round(fs)}</button>`;
  }

  // ── Build card HTML for a single stock ───────────────────────────────────
  function buildCard(s) {
    const color  = SIG_COLOR[s.signal] || 'var(--muted)';
    const hex    = SIG_HEX[s.signal]   || '#8b949e';
    const score  = Math.round(s.composite_score ?? 0);
    const up     = s.upside_pct != null;
    const upside = up ? `${s.upside_pct > 0 ? '+' : ''}${s.upside_pct.toFixed(1)}%` : '—';
    const badgeStyle = !up
      ? 'background:rgba(255,255,255,0.05);color:var(--muted)'
      : s.upside_pct > 0
        ? 'background:rgba(63,185,80,0.15);color:#3fb950'
        : 'background:rgba(248,81,73,0.15);color:#f85149';
    const price  = s.price != null ? `$${Number(s.price).toFixed(2)}` : '—';
    const target = s.analyst_target_price != null ? `$${Number(s.analyst_target_price).toFixed(0)}` : '—';
    const stop   = s.stop_loss_price != null ? `$${Number(s.stop_loss_price).toFixed(2)}` : '—';

    return `
      <div class="stock-card"
           style="border-left-color:${hex}"
           onclick="openStock('${s.ticker}')">
        <div class="card-top">
          <span class="card-rank">#${s.rank}</span>
          <span class="card-upside-badge" style="${badgeStyle}">${upside}</span>
        </div>
        <div class="card-ticker">${s.ticker}</div>

  // ── Render filtered grid ──────────────────────────────────────────────────
  function renderGrid(stocks, filtered) {
    const grid = document.getElementById('stock-grid');
    if (!grid) return;

    if (filtered && stocks.length === 0) {
      grid.classList.remove('table-mode');
      grid.innerHTML = `
        <div class="no-results">
          <div class="no-results-icon">🔍</div>
          <div class="no-results-text">No stocks match your filter.<br>Try a different ticker or price range.</div>
          <button class="no-results-clear" onclick="clearFilters()">Clear filters</button>
        </div>`;
      return;
    }

    if (viewMode === 'table') {
      renderTableView(stocks);
    } else {
      grid.classList.remove('table-mode');  // restore 2-col card grid
      grid.innerHTML = stocks.map(buildCard).join('');
    }
  }

  // ── Toggle cards ↔ table ──────────────────────────────────────────────────
  function toggleView() {
    viewMode = viewMode === 'cards' ? 'table' : 'cards';
    applyFilters();
  }

  // ── Sort table column ─────────────────────────────────────────────────────
  function sortTableCol(col, numeric) {
    if (tableSort.col === col) { tableSort.desc = !tableSort.desc; }
    else { tableSort.col = col; tableSort.desc = numeric; }
    applyFilters();
  }

  // ── Table view renderer (Option C dark) ───────────────────────────────────
  function renderTableView(stocks) {
    const grid = document.getElementById('stock-grid');
    if (!grid) return;
    grid.classList.add('table-mode');   // collapse 2-col grid → full-width block

    function sigCls(sig) {
      if (sig === 'STRONG BUY') return 'sb';
      if (sig === 'BUY')        return 'buy';
      if (sig === 'WATCH')      return 'watch';
      return 'sell';
    }
    function sigColor(sig) {
      if (sig === 'STRONG BUY') return '#3fb950';
      if (sig === 'BUY')        return '#e3b341';
      if (sig === 'WATCH')      return '#8b949e';
      return '#f85149';
    }
    function subColor(v) {
      if (v == null) return 'var(--muted)';
      if (v >= 70)  return '#3fb950';
      if (v >= 45)  return 'var(--text)';
      return '#f85149';
    }

    const COLS = [
      { label: '#',         numeric: false },
      { label: 'Ticker',    numeric: false },
      { label: 'Company',   numeric: false },
      { label: 'Signal',    numeric: false },
      { label: 'Score',     numeric: true  },
      { label: 'Price',     numeric: true  },
      { label: 'Target',    numeric: true  },
      { label: 'Upside %',  numeric: true  },
      { label: 'Stop',      numeric: true  },
      { label: 'Analyst',   numeric: true  },
      { label: 'Momentum',  numeric: true  },
      { label: 'Fundmntls', numeric: true  },
      { label: 'Social',    numeric: true  },
      { label: '8-K',       numeric: true  },
    ];

    function getVal(s, col) {
      switch (col) {
        case 0:  return s.rank ?? 0;
        case 1:  return s.ticker;
        case 2:  return s.company || '';
        case 3:  return s.signal;
        case 4:  return s.composite_score ?? 0;
        case 5:  return s.price ?? 0;
        case 6:  return s.analyst_target_price ?? 0;
        case 7:  return s.upside_pct ?? 0;
        case 8:  return s.stop_loss_price ?? 0;
        case 9:  return s.scores?.analyst ?? 0;
        case 10: return s.scores?.momentum ?? 0;
        case 11: return s.scores?.fundamentals ?? 0;
        case 12: return s.scores?.social ?? 0;
        case 13: return s.scores?.filing ?? 50;
        default: return '';
      }
    }

    const sorted = [...stocks].sort((a, b) => {
      const va = getVal(a, tableSort.col);
      const vb = getVal(b, tableSort.col);
      if (typeof va === 'number') return tableSort.desc ? vb - va : va - vb;
      return tableSort.desc
        ? String(vb).localeCompare(String(va))
        : String(va).localeCompare(String(vb));
    });

    const ths = COLS.map((c, i) => {
      const active = tableSort.col === i;
      const arrow  = active ? (tableSort.desc ? '↓' : '↑') : '↕';
      return `<th class="${active ? 'tbl-sorted' : ''}" onclick="sortTableCol(${i},${c.numeric})">${c.label}<span class="th-sort">${arrow}</span></th>`;
    }).join('');

    const rows = sorted.map(s => {
      const sc     = sigCls(s.signal);
      const sColor = sigColor(s.signal);
      const score  = Math.round(s.composite_score ?? 0);
      const up     = s.upside_pct;
      const upStr  = up != null ? `${up > 0 ? '+' : ''}${up.toFixed(1)}%` : '—';
      const upClr  = (up ?? 0) > 0 ? '#3fb950' : '#f85149';
      const emoji  = { sb: '🟢', buy: '🟡', watch: '⚪', sell: '🔴' }[sc];
      const fs     = s.scores?.filing;
      const fsStr  = fs != null ? fs : '—';
      return `<tr class="tr-${sc}">
        <td>${s.rank}</td>
        <td>${s.ticker}</td>
        <td>${s.company ?? ''}</td>
        <td><span class="tbl-sig-${sc}">${emoji} ${s.signal}</span></td>
        <td>
          <div class="tbl-bar-wrap">
            <div class="tbl-bar-bg"><div class="tbl-bar-fill" style="width:${score}%;background:${sColor}"></div></div>
            <span class="tbl-score" style="color:${sColor}">${score}</span>
          </div>
        </td>
        <td>${s.price != null ? '$' + Number(s.price).toFixed(2) : '—'}</td>
        <td>${s.analyst_target_price != null ? '$' + Number(s.analyst_target_price).toFixed(0) : '—'}</td>
        <td style="color:${upClr};font-weight:700">${upStr}</td>
        <td>${s.stop_loss_price != null ? '$' + Number(s.stop_loss_price).toFixed(2) : '—'}</td>
        <td style="color:${subColor(s.scores?.analyst)}">${s.scores?.analyst ?? '—'}</td>
        <td style="color:${subColor(s.scores?.momentum)}">${s.scores?.momentum ?? '—'}</td>
        <td style="color:${subColor(s.scores?.fundamentals)}">${s.scores?.fundamentals ?? '—'}</td>
        <td style="color:${subColor(s.scores?.social)}">${s.scores?.social ?? '—'}</td>
        <td style="color:${subColor(fs)}">${fsStr}</td>
      </tr>`;
    }).join('');

    grid.innerHTML = `
      <div class="stock-table-wrap">
        <table class="stock-table">
          <thead><tr>${ths}</tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
    positionTableWrap();   // fit table to remaining viewport below sticky band
  }

  // ── Analyst summary parser ────────────────────────────────────────────────
  // Parses the stored signal_details.analyst string, e.g.:
  //   "5 upgrade(s), 0 downgrade(s) in last 7d | 93% of 71 analysts bullish"
  function parseAnalyst(detail) {
    if (!detail) return null;
    const up    = detail.match(/(\d+)\s+upgrade/i);
    const down  = detail.match(/(\d+)\s+downgrade/i);
    const bull  = detail.match(/(\d+)%\s+of\s+(\d+)\s+analysts/i);
    return {
      upgrades:      up   ? parseInt(up[1])   : 0,
      downgrades:    down ? parseInt(down[1]) : 0,
      bullishPct:    bull ? parseInt(bull[1]) : null,
      totalAnalysts: bull ? parseInt(bull[2]) : null,
    };
  }

  // Build the analyst summary HTML block for a card
  function analystHTML(detail) {
    const a = parseAnalyst(detail);
    if (!a) return '';

    // Bar colour: green ≥60%, amber 40–59%, red <40%
    const pct   = a.bullishPct;
    const bCol  = pct == null  ? '#8b949e'
                : pct >= 60    ? '#3fb950'
                : pct >= 40    ? '#e3b341'
                :                '#f85149';

    const barHTML = pct != null
      ? `<div class="bullish-bar-bg">
           <div class="bullish-bar-fill" style="width:${pct}%;background:${bCol}"></div>
         </div>
         <div class="analyst-caption">
           <span>${a.totalAnalysts ? a.totalAnalysts + ' analysts' : 'analysts'}</span>
           <span class="bullish-pct" style="color:${bCol}">${pct}% bullish</span>
         </div>`
      : `<div class="analyst-caption">
           <span style="color:var(--muted)">No consensus data</span>
         </div>`;

    return `
      <div class="card-analyst">
        <div class="analyst-moves">
          <span class="analyst-up">↑${a.upgrades}</span>
          <span class="analyst-period">last 7d</span>
          <span class="analyst-down">↓${a.downgrades}</span>
        </div>
        ${barHTML}
      </div>`;
  }

  // ── Helpers ───────────────────────────────────────────────────────────────
  function dayTabLabel(dateStr) {
    // '2026-05-17' → '17-May'
    const [y, m, d] = dateStr.split('-').map(Number);
    const mon = new Date(y, m - 1).toLocaleDateString('en-AU', { month: 'short' });
    return `${d}-${mon}`;
  }

  function archiveTabLabel(monthKey) {
    // '2026-05' → 'May-2026'
    const [y, m] = monthKey.split('-').map(Number);
    const mon = new Date(y, m - 1).toLocaleDateString('en-AU', { month: 'short' });
    return `${mon}-${y}`;
  }

  function showEmpty(msg) {
    // Even on empty state, render tabs with Dictionary available
    const bar = document.getElementById('tab-bar');
    bar.innerHTML = '';
    const dictBtn = document.createElement('button');
    dictBtn.className = 'tab-btn dict';
    dictBtn.dataset.id = 'dictionary';
    dictBtn.textContent = '📖 Dictionary';
    dictBtn.onclick = () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.id === 'dictionary'));

  }

  function updateSubtitle() {
    if (!lastFetchAt) return;
    const mins = Math.round((Date.now() - lastFetchAt) / 60_000);
    setSubtitleText(
      mins < 1   ? 'Updated just now' :
      mins === 1 ? 'Updated 1 min ago' :
                  `Updated ${mins} min ago`
    );
  }

    const btn = document.getElementById('btn-update');

    setSubtitleText('Checking for updates…');
    await fetchData(true);   // force=true: always re-render current tab
