<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="StockPicks">
  <link rel="manifest" href="dashboard-manifest.json">
  <title>StockPicks Dashboard</title>

  <!-- PIN gate — must be first script so body is hidden before content renders -->
  <script src="auth.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg:      #0a0a0a;
      --surface: #161616;
      --card:    #1e1e1e;
      --border:  #2a2a2a;
      --green:   #00c896;
      --amber:   #f59e0b;
      --red:     #ff4d4d;
      --muted:   #555;
      --text:    #f0f0f0;
      --radius:  10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      min-height: 100vh;
      padding-bottom: calc(env(safe-area-inset-bottom) + 24px);
      overscroll-behavior: none;
    }

    /* ─── Header ─────────────────────────────────────────────── */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: calc(14px + env(safe-area-inset-top)) 16px 11px;
      position: sticky;
      top: 0;
      z-index: 30;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .header-left h1 {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.4px;
    }
    .header-left h1 em { color: var(--green); font-style: normal; }
    .header-subtitle {
      font-size: 11px;
      color: var(--muted);
      margin-top: 3px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    /* Bold date — top right — key design element */
    .header-date { text-align: right; flex-shrink: 0; margin-left: 10px; }
    .date-primary   { font-size: 14px; font-weight: 800; color: var(--green); letter-spacing: -0.2px; line-height: 1.2; }
    .date-secondary { font-size: 10px; font-weight: 500; color: var(--muted); margin-top: 2px; }

    /* ─── Tab bar ─────────────────────────────────────────────── */
    .tab-bar-wrap {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      z-index: 29;
    }
    .tab-bar {
      display: flex;
      align-items: stretch;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding: 0 6px;
    }
    .tab-bar::-webkit-scrollbar { display: none; }

    .tab-btn {
      flex-shrink: 0;
      padding: 10px 12px;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      white-space: nowrap;
      transition: color 0.15s;
    }
    .tab-btn:active { opacity: 0.6; }
    .tab-btn.active { color: var(--green); border-bottom-color: var(--green); }
    .tab-btn.archive { font-size: 11px; }
    .tab-btn.archive.active { opacity: 1; }
    .tab-sep { width: 1px; background: var(--border); flex-shrink: 0; margin: 7px 5px; }

    /* ─── Run meta bar ───────────────────────────────────────── */
    .run-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 14px;
      font-size: 11px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    .run-meta-label { color: var(--green); font-weight: 700; }

    /* ─── 3-column stock grid ────────────────────────────────── */
    .stock-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 7px;
      padding: 10px 9px 6px;
    }

    /* Each card is a clickable div — tapping opens Yahoo Finance */
    .stock-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-top: 3px solid var(--border);   /* overridden per signal */
      border-radius: var(--radius);
      padding: 9px 8px 7px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 0;
      transition: transform 0.1s, opacity 0.1s;
      -webkit-user-select: none;
      user-select: none;
      position: relative;
    }
    .stock-card:active { transform: scale(0.95); opacity: 0.75; }

    /* ── Card internals ── */
    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }
    .card-rank {
      font-size: 9px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.2px;
    }
    .card-ext-icon {
      font-size: 10px;
      color: var(--muted);
      line-height: 1;
    }

    .card-ticker {
      font-size: 17px;
      font-weight: 900;
      letter-spacing: -0.5px;
      line-height: 1;
      margin-bottom: 3px;
    }

    .card-signal {
      font-size: 8.5px;
      font-weight: 700;
      letter-spacing: 0.3px;
      margin-bottom: 6px;
      line-height: 1;
    }

    /* Score bar */
    .score-bar-bg {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      margin-bottom: 6px;
      overflow: hidden;
    }
    .score-bar-fill { height: 100%; border-radius: 2px; }

    .card-score-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 4px;
    }
    .card-score   { font-size: 20px; font-weight: 900; letter-spacing: -0.8px; line-height: 1; }
    .card-upside  { font-size: 10px; font-weight: 700; }

    .card-price {
      font-size: 8.5px;
      color: var(--muted);
      line-height: 1.4;
      margin-bottom: 7px;
    }

    /* ── Source link buttons at bottom of each card ── */
    .card-sources {
      display: flex;
      gap: 3px;
      margin-top: auto;
      padding-top: 6px;
      border-top: 1px solid var(--border);
    }
    /* Stop card click firing when a source button is tapped */
    .card-sources a {
      flex: 1;
      text-align: center;
      font-size: 8px;
      font-weight: 800;
      color: var(--muted);
      padding: 4px 2px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 4px;
      text-decoration: none;
      letter-spacing: 0.3px;
      line-height: 1;
    }
    .card-sources a:active { background: rgba(255,255,255,0.14); color: var(--text); }

    /* ─── Legend strip ───────────────────────────────────────── */
    .legend {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      padding: 7px 10px 6px;
      border-bottom: 1px solid var(--border);
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 9px;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0.3px;
    }
    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* ─── States ─────────────────────────────────────────────── */
    .state-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 24px;
      color: var(--muted);
      gap: 14px;
      text-align: center;
    }
    .state-box p { font-size: 14px; line-height: 1.7; }

    .spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2.4s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }
  </style>
</head>
<body>

  <!-- ── Header ──────────────────────────────────────────────── -->
  <div class="header" id="header">
    <div class="header-left">
      <h1>📈 Stock<em>Picks</em></h1>
      <div class="header-subtitle">
        <span class="dot"></span>
        <span id="subtitle-text">Loading…</span>
      </div>
    </div>
    <div class="header-date">
      <div class="date-primary"   id="date-primary">—</div>
      <div class="date-secondary" id="date-secondary">—</div>
    </div>
  </div>

  <!-- ── Tab bar ─────────────────────────────────────────────── -->
  <div class="tab-bar-wrap" id="tab-bar-wrap">
    <div class="tab-bar" id="tab-bar">
      <div style="padding:11px 8px;color:var(--muted);font-size:11px">Loading…</div>
    </div>
  </div>

  <!-- ── Content ─────────────────────────────────────────────── -->
  <div id="content">
    <div class="state-box">
      <div class="spinner"></div>
      <p>Fetching stock picks…</p>
    </div>
  </div>


<script>
  // ── Config ──────────────────────────────────────────────────────────────
  const DATA_URL      = 'https://raw.githubusercontent.com/karthikpalsg/stock-recommender/main/data/history.json';
  const POLL_INTERVAL = 5 * 60 * 1000;  // poll every 5 min

  // External source URLs per ticker
  const SRC = {
    YF:   t => `https://finance.yahoo.com/quote/${t}`,           // price, news, analyst ratings, financials
    FV:   t => `https://finviz.com/quote.ashx?t=${t}`,           // chart, ratios, insider trades, news
    SA:   t => `https://seekingalpha.com/symbol/${t}`,           // analyst articles & buy/sell ratings
  };

  // Signal → accent colour
  const SIG_COLOR = {
    'STRONG BUY': 'var(--green)',
    'BUY':        'var(--amber)',
    'WATCH':      'var(--muted)',
    'AVOID':      'var(--red)',
  };
  // Raw hex values for border-top (CSS variables don't work in inline border shorthand on older WebKit)
  const SIG_HEX = {
    'STRONG BUY': '#00c896',
    'BUY':        '#f59e0b',
    'WATCH':      '#333',
    'AVOID':      '#ff4d4d',
  };

  // ── State ───────────────────────────────────────────────────────────────
  let allRuns     = [];
  let tabMeta     = [];
  let activeTabId = null;
  let lastRunId   = null;
  let lastFetchAt = null;

  // ── Boot ────────────────────────────────────────────────────────────────
  window.addEventListener('load', () => {
    positionTabBar();
    new ResizeObserver(positionTabBar).observe(document.getElementById('header'));
    fetchData();
    setInterval(fetchData,      POLL_INTERVAL);
    setInterval(updateSubtitle, 30_000);
  });

  function positionTabBar() {
    document.getElementById('tab-bar-wrap').style.top =
      document.getElementById('header').offsetHeight + 'px';
  }

  // ── Fetch ────────────────────────────────────────────────────────────────
  async function fetchData() {
    try {
      const res  = await fetch(DATA_URL + '?_=' + Date.now());
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      lastFetchAt = Date.now();
      allRuns     = (data.runs || []).slice();

      if (data.last_run !== lastRunId) {
        lastRunId = data.last_run;
        buildUI();
      }
      updateSubtitle();
    } catch (e) {
      setSubtitleText('Could not load — check connection');
    }
  }

  // ── Week boundary ────────────────────────────────────────────────────────
  function getMondayDateStr() {
    const syd = new Date().toLocaleDateString('en-CA', { timeZone: 'Australia/Sydney' });
    const [y, m, d] = syd.split('-').map(Number);
    const dt  = new Date(y, m - 1, d);
    const dow = dt.getDay();
    dt.setDate(dt.getDate() + (dow === 0 ? -6 : 1 - dow));
    return dt.toLocaleDateString('en-CA');
  }

  // ── Build tabs + content ──────────────────────────────────────────────────
  function buildUI() {
    if (!allRuns.length) {
      showEmpty('No runs yet. The engine runs automatically at 5am and 7am Sydney time on weekdays.');
      return;
    }

    const monday    = getMondayDateStr();
    const weekRuns  = [];
    const monthBest = {};

    allRuns.forEach(run => {
      if (run.run_date >= monday) {
        weekRuns.push(run);
      } else {
        const mk = run.run_date.slice(0, 7);
        if (!monthBest[mk] || run.run_id > monthBest[mk].run_id) monthBest[mk] = run;
      }
    });

    weekRuns.sort((a, b) => (b.run_id > a.run_id ? 1 : -1));
    const archiveKeys = Object.keys(monthBest).sort().reverse();
    buildTabs(weekRuns, archiveKeys, monthBest);
  }

  // ── Tabs ──────────────────────────────────────────────────────────────────
  function buildTabs(weekRuns, archiveKeys, monthBest) {
    tabMeta = [];

    weekRuns.forEach(run => {
      const day  = dayName(run.run_date);
      const time = runTimeLabel(run);
      tabMeta.push({ id: 'w-' + run.run_id, label: day + ' ' + time, run, type: 'week' });
    });

    archiveKeys.forEach(mk => {
      const [y, m] = mk.split('-');
      const label  = new Date(Number(y), Number(m) - 1)
                       .toLocaleDateString('en-AU', { month: 'short', year: '2-digit' });
      tabMeta.push({ id: 'a-' + mk, label, run: monthBest[mk], type: 'archive', monthKey: mk });
    });

    const bar = document.getElementById('tab-bar');
    bar.innerHTML = '';
    tabMeta.forEach((tab, i) => {
      if (i > 0 && tab.type === 'archive' && tabMeta[i-1].type === 'week') {
        const sep = document.createElement('div');
        sep.className = 'tab-sep';
        bar.appendChild(sep);
      }
      const btn = document.createElement('button');
      btn.className = 'tab-btn' + (tab.type === 'archive' ? ' archive' : '');
      btn.dataset.id = tab.id;
      btn.textContent = tab.label;
      btn.onclick = () => selectTab(tab.id);
      bar.appendChild(btn);
    });

    const restore = (activeTabId && tabMeta.find(t => t.id === activeTabId))
                    ? activeTabId : tabMeta[0]?.id;
    if (restore) selectTab(restore);
  }

  function selectTab(id) {
    const tab = tabMeta.find(t => t.id === id);
    if (!tab) return;
    activeTabId = id;

    document.querySelectorAll('.tab-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.id === id)
    );

    const btn = document.querySelector(`.tab-btn[data-id="${id}"]`);
    btn?.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });

    updateHeaderDate(tab);
    renderRun(tab.run);
  }

  // ── Header date ───────────────────────────────────────────────────────────
  function updateHeaderDate(tab) {
    const p = document.getElementById('date-primary');
    const s = document.getElementById('date-secondary');

    if (tab.type === 'archive') {
      const [y, m] = tab.monthKey.split('-');
      const dt = new Date(Number(y), Number(m) - 1);
      p.textContent = dt.toLocaleDateString('en-AU', { month: 'long', year: 'numeric' });
      s.textContent = 'Monthly Archive';
    } else {
      const dt = new Date(tab.run.run_date + 'T12:00:00');
      p.textContent = dt.toLocaleDateString('en-AU', { weekday: 'long', day: 'numeric', month: 'long' });
      s.textContent = tab.run.run_label || tab.run.run_time?.slice(0, 5) || '';
    }
  }

  // ── Render 3-column grid ──────────────────────────────────────────────────
  function renderRun(run) {
    const el = document.getElementById('content');
    if (!run?.stocks?.length) {
      el.innerHTML = '<div class="state-box"><p>No stock data for this run.</p></div>';
      return;
    }

    const cards = run.stocks.map(s => {
      const color  = SIG_COLOR[s.signal] || 'var(--muted)';
      const hex    = SIG_HEX[s.signal]   || '#333';
      const score  = Math.round(s.composite_score ?? 0);
      const up     = s.upside_pct != null;
      const upside = up ? `+${s.upside_pct.toFixed(1)}%` : '—';
      const uColor = up && s.upside_pct > 0 ? 'var(--green)' : 'var(--red)';
      const price  = s.price != null ? `$${Number(s.price).toFixed(2)}` : '—';
      const target = s.analyst_target_price != null ? `$${Number(s.analyst_target_price).toFixed(0)}` : '—';
      const stop   = s.stop_loss_price != null ? `$${Number(s.stop_loss_price).toFixed(2)}` : '—';
      const t      = encodeURIComponent(s.ticker);

      return `
        <div class="stock-card"
             style="border-top-color:${hex}"
             onclick="openStock('${s.ticker}')">

          <div class="card-top">
            <span class="card-rank">#${s.rank}</span>
            <span class="card-ext-icon">↗</span>
          </div>

          <div class="card-ticker">${s.ticker}</div>
          <div class="card-signal" style="color:${color}">${s.signal_emoji ?? ''} ${s.signal}</div>

          <div class="score-bar-bg">
            <div class="score-bar-fill" style="width:${score}%;background:${hex}"></div>
          </div>

          <div class="card-score-row">
            <span class="card-score" style="color:${color}">${score}</span>
            <span class="card-upside" style="color:${uColor}">${upside}</span>
          </div>

          <div class="card-price">${price} → ${target}<br>Stop ${stop}</div>

          <!-- Source buttons — stopPropagation so card click doesn't also fire -->
          <div class="card-sources" onclick="event.stopPropagation()">
            <a href="${SRC.YF(s.ticker)}" target="_blank" rel="noopener" title="Yahoo Finance — price, news, financials, analyst ratings">YF</a>
            <a href="${SRC.FV(s.ticker)}" target="_blank" rel="noopener" title="Finviz — chart, ratios, insider trades, news snapshot">FV</a>
            <a href="${SRC.SA(s.ticker)}" target="_blank" rel="noopener" title="Seeking Alpha — analyst articles and buy/sell ratings">SA</a>
          </div>
        </div>`;
    }).join('');

    el.innerHTML = `
      <div class="run-meta">
        <span>${run.total_stocks} stocks &middot; ${run.run_date}</span>
        <span class="run-meta-label">${run.run_label ?? 'Run'}</span>
      </div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#00c896"></div>STRONG BUY</div>
        <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div>BUY</div>
        <div class="legend-item"><div class="legend-dot" style="background:#333"></div>WATCH</div>
        <div class="legend-item"><div class="legend-dot" style="background:#ff4d4d"></div>AVOID</div>
        <div class="legend-item" style="margin-left:auto;font-size:8px;color:var(--muted)">Tap card = YF &nbsp;·&nbsp; YF/FV/SA = sources</div>
      </div>
      <div class="stock-grid">${cards}</div>`;
  }

  // Opens Yahoo Finance (primary action — whole card tap)
  function openStock(ticker) {
    window.open(SRC.YF(ticker), '_blank', 'noopener');
  }

  // ── Helpers ───────────────────────────────────────────────────────────────
  function dayName(dateStr) {
    return new Date(dateStr + 'T12:00:00')
             .toLocaleDateString('en-AU', { weekday: 'short' });
  }

  function runTimeLabel(run) {
    const lbl = run.run_label || '';
    if (lbl.includes('5am')) return '5am';
    if (lbl.includes('7am')) return '7am';
    return run.run_time?.slice(0, 5) || '';
  }

  function showEmpty(msg) {
    document.getElementById('tab-bar').innerHTML = '';
    document.getElementById('content').innerHTML =
      `<div class="state-box"><p>${msg}</p></div>`;
  }

  function setSubtitleText(t) { document.getElementById('subtitle-text').textContent = t; }

  function updateSubtitle() {
    if (!lastFetchAt) return;
    const mins = Math.round((Date.now() - lastFetchAt) / 60_000);
    setSubtitleText(
      mins < 1   ? 'Updated just now' :
      mins === 1 ? 'Updated 1 min ago' :
                  `Updated ${mins} min ago`
    );
  }
</script>
</body>
</html>
