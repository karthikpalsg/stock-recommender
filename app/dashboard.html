  // ── Recommendation tab renderer ───────────────────────────────────────────
  function renderRecommendation() {
    const el = document.getElementById('content');

    // Use lastRunId (set directly from data.last_run during fetch) — bypasses sort entirely
    const sortedDesc = [...allRuns].sort((a, b) => b.run_date.localeCompare(a.run_date));
    const sortedAsc  = [...sortedDesc].reverse();   // oldest → latest, for comparison tables
    const run        = allRuns.find(r => r.run_id === lastRunId) ?? sortedDesc[0]; // LATEST run
    const prevRun    = sortedDesc.find(r => r.run_id !== run.run_id) ?? null;

    if (!run?.stocks?.length) {
      el.innerHTML = '<div class="state-box"><p>No recommendation data available.</p></div>';
      return;
    }

    // Top 3 buys sorted by composite score
    const buys = run.stocks
      .filter(s => s.signal === 'STRONG BUY' || s.signal === 'BUY')
      .sort((a, b) => (b.composite_score ?? 0) - (a.composite_score ?? 0))
      .slice(0, 3);

    // Sell candidates: AVOID + any stock >10% above analyst target
    const sells = run.stocks
      .filter(s => s.signal === 'AVOID' || (s.upside_pct != null && s.upside_pct < -10))
      .sort((a, b) => (a.upside_pct ?? 0) - (b.upside_pct ?? 0))
      .slice(0, 3);

    // Cross-run stock history for a given ticker (up to last 4 runs, oldest first)
    function getHistory(ticker) {
      return sortedAsc
        .map(r => ({ run: r, stock: r.stocks?.find(s => s.ticker === ticker) }))
        .filter(x => x.stock != null)
        .slice(-4);
    }

    // Cross-run comparison mini-table
    function buildCompareTable(ticker) {
      const hist = getHistory(ticker);
      if (hist.length < 2) return '';
      const MON = ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const lbl = r => { const [,mm,dd] = r.run_date.split('-'); return `${parseInt(dd)}-${MON[parseInt(mm)]}`; };
      const dirCls = (latV, firstV, lowerBetter = false) => {
        const l = parseFloat(String(latV).replace(/[^0-9.-]/g,'')),
              f = parseFloat(String(firstV).replace(/[^0-9.-]/g,''));
        if (isNaN(l)||isNaN(f)||l===f) return '';
        return (lowerBetter ? l<f : l>f) ? 'up-val' : 'down-val';
      };
      const ths = hist.map((h,i)=>{
        const latest = i===hist.length-1;
        return `<th class="${latest?'latest-col':''}">${latest?'★ ':''}${lbl(h.run)}</th>`;
      }).join('');
      const row = (label, fn, lowerBetter=false) => {
        const vals = hist.map(h=>fn(h.stock));
        const first = vals[0];
        const tds = vals.map((v,i)=>{
          const latest = i===vals.length-1;
          const cls = latest ? `latest-col ${dirCls(v,first,lowerBetter)}` : '';
          return `<td class="${cls.trim()}">${v}</td>`;
        }).join('');
        return `<tr><td>${label}</td>${tds}</tr>`;
      };
      return `
        <div class="rec-compare">
          <table class="rec-compare-tbl">
            <thead><tr><th></th>${ths}</tr></thead>
            <tbody>
              ${row('Rank',     s=>`#${s.rank}`,                               true)}
              ${row('Score',    s=>(s.composite_score??0).toFixed(1))}
              ${row('Analyst',  s=>s.scores?.analyst?.toFixed(0)??'—')}
              ${row('Momentum', s=>s.scores?.momentum?.toFixed(0)??'—')}
              ${row('Fundmntls',s=>s.scores?.fundamentals?.toFixed(0)??'—')}
            </tbody>
          </table>
        </div>`;
    }

    // Auto-generate buy thesis from available data
    function buyThesis(s) {
      const hist   = getHistory(s.ticker);
      const first  = hist[0]?.stock;
      const latest = hist[hist.length-1]?.stock ?? s;
      const parts  = [];

      if (hist.length>1 && first?.rank && latest.rank && latest.rank < first.rank)
        parts.push(`Rank moved from <strong>#${first.rank}</strong> to <strong>#${latest.rank}</strong> over ${hist.length-1} run${hist.length>2?'s':''} — the clearest upward trend in the watchlist.`);

      if (first && (latest.scores?.analyst??0)-(first.scores?.analyst??0)>=20) {
        const jump = ((latest.scores?.analyst??0)-(first.scores?.analyst??0)).toFixed(0);
        parts.push(`Analyst score jumped <strong>${jump} points</strong> — a fresh upgrade or rating revision landed this week.`);
      }

      const ad   = s.signal_details?.analyst || '';
      const bull = ad.match(/(\d+)%\s+of\s+(\d+)\s+analysts/i);
      const upg  = ad.match(/(\d+)\s+upgrade/i)?.[1] ?? '0';
      const dwn  = ad.match(/(\d+)\s+downgrade/i)?.[1] ?? '0';
      if (bull)
        parts.push(`<strong>${bull[1]}%</strong> of ${bull[2]} analysts are bullish · <strong>↑${upg}</strong> upgrade${upg!=='1'?'s':''}, <strong>↓${dwn}</strong> downgrade${dwn!=='1'?'s':''} in the last 7 days.`);

      const md    = s.signal_details?.momentum || '';
      const wkRet = md.match(/4-wk return:\s*([+-]?\d+\.?\d*)%/i);
      const abMA  = /above 50-day MA/i.test(md);
      const vol   = md.match(/Volume ratio:\s*([\d.]+)x/i);
      if (wkRet) {
        const r = parseFloat(wkRet[1]), rs = `${r>=0?'+':''}${wkRet[1]}%`;
        let m = `4-week return <strong>${rs}</strong>`;
        if (abMA) m += ' · above the 50-day moving average';
        if (vol)  m += ` · volume ratio ${vol[1]}x`;
        parts.push(m + '.');
      }

      const fd  = s.signal_details?.fundamentals || '';
      const rev = fd.match(/Revenue growth:\s*(\d+)%/i);
      const gm  = fd.match(/Gross margin:\s*(\d+)%/i);
      const items = [];
      if (rev) items.push(`revenue growing <strong>${rev[1]}%</strong>`);
      if (gm)  items.push(`gross margin <strong>${gm[1]}%</strong>`);
      if (items.length) parts.push(items.join(' · ') + '.');

      return parts.join(' ');
    }

    // Auto-generate sell thesis from available data
    function sellThesis(s) {
      const hist   = getHistory(s.ticker);
      const first  = hist[0]?.stock;
      const latest = hist[hist.length-1]?.stock ?? s;
      const parts  = [];

      if (s.upside_pct!=null && s.upside_pct<0) {
        const above  = Math.abs(s.upside_pct).toFixed(0);
        const tgtStr = s.analyst_target_price!=null ? `$${Number(s.analyst_target_price).toFixed(0)}` : 'analyst consensus';
        parts.push(`Trading <strong>${above}% above</strong> analyst consensus of <strong>${tgtStr}</strong> — valuation has stretched past where the fundamentals justify.`);
      }

      const md    = s.signal_details?.momentum || '';
      const wkRet = md.match(/4-wk return:\s*([+-]?\d+\.?\d*)%/i);
      if (wkRet && parseFloat(wkRet[1]) > 30)
        parts.push(`4-week return of <strong>+${wkRet[1]}%</strong> — price has likely outrun the underlying business.`);

      if ((s.scores?.fundamentals??100)<40)
        parts.push(`Fundamentals score <strong>${s.scores.fundamentals.toFixed(0)}/100</strong> does not support the current price level.`);

      const sd      = s.signal_details?.social || '';
      const falling = sd.match(/↓ falling \((-?\d+) vs yesterday\)/i);
      if (falling)
        parts.push(`Social sentiment falling (<strong>${Math.abs(parseInt(falling[1]))}</strong> fewer mentions vs yesterday).`);

      if (hist.length>1 && first?.rank && latest.rank && latest.rank > first.rank)
        parts.push(`Rank slipped from <strong>#${first.rank}</strong> to <strong>#${latest.rank}</strong> — relative strength declining.`);

      if (s.signal==='AVOID')
        parts.push(`Composite score <strong>${Math.round(s.composite_score??0)}/100</strong> — weak signals across multiple dimensions.`);

      return parts.join(' ');
    }

    // Rank movement badge vs previous run
    function rankMove(ticker, rank) {
      if (!prevRun?.stocks) return '';
      const prev = prevRun.stocks.find(st => st.ticker===ticker);
      if (!prev?.rank) return '';
      const diff = prev.rank - rank;
      if (diff>0) return `<span class="rec-rank-move up">↑${diff}</span>`;
      if (diff<0) return `<span class="rec-rank-move down">↓${Math.abs(diff)}</span>`;
      return '<span class="rec-rank-move flat">→</span>';
    }

    function buildBuyCard(s) {
      const color  = s.signal==='STRONG BUY' ? '#3fb950' : '#e3b341';
      const emoji  = s.signal==='STRONG BUY' ? '🟢' : '🟡';
      const price  = s.price!=null ? `$${Number(s.price).toFixed(2)}` : '—';
      const target = s.analyst_target_price!=null ? `$${Number(s.analyst_target_price).toFixed(0)}` : '—';
      const stop   = s.stop_loss_price!=null ? `$${Number(s.stop_loss_price).toFixed(2)}` : '—';
      const upside = s.upside_pct!=null ? `${s.upside_pct>0?'+':''}${s.upside_pct.toFixed(1)}%` : '—';
      const upClr  = (s.upside_pct??0)>0 ? '#3fb950' : '#f85149';
      const score  = (s.composite_score??0).toFixed(1);
      const rratio = (s.upside_pct??0)>0 ? `R/R ${(s.upside_pct/8).toFixed(1)}:1` : '';
      const ad     = s.signal_details?.analyst||'';
      const bull   = ad.match(/(\d+)%\s+of\s+(\d+)\s+analysts/i);
      const pct    = bull ? parseInt(bull[1]) : null;
      const tot    = bull ? parseInt(bull[2]) : null;
      const upg    = ad.match(/(\d+)\s+upgrade/i)?.[1]??'0';
      const dwn    = ad.match(/(\d+)\s+downgrade/i)?.[1]??'0';
      const bCol   = pct==null ? '#8b949e' : pct>=60 ? '#3fb950' : pct>=40 ? '#e3b341' : '#f85149';
      const spark  = buildSparkline(trendMode==='1m' ? s.prices_1m : s.prices_3m);
      const thesis = buyThesis(s);
      const cmp    = buildCompareTable(s.ticker);
      const newsUrl= getNewsLink(s.ticker, s.signal);
      return `
      <div class="rec-card rec-buy" style="border-left-color:${color}">
        <div class="rec-card-top">
          <div class="rec-rank-badge" style="color:${color}">#${s.rank} ${rankMove(s.ticker,s.rank)}</div>
          <div class="rec-signal-badge" style="color:${color}">${emoji} ${s.signal}</div>
        </div>
        <div class="rec-card-main">
          <div>
            <div class="rec-ticker" style="color:${color}">${s.ticker}</div>
            <div class="rec-company">${s.company||''}</div>
          </div>
          <div class="rec-price-block">
            <div class="rec-current-price">${price}</div>
            <div class="rec-score-label">Score <strong style="color:${color}">${score}</strong>/100</div>
          </div>
        </div>
        <div class="rec-price-row">
          <span class="rec-target">→ ${target}</span>
          <span class="rec-upside" style="color:${upClr}">${upside}</span>
          <span class="rec-stop">Stop <strong>${stop}</strong></span>
          ${rratio ? `<span class="rec-rr">${rratio}</span>` : ''}
        </div>
        ${cmp}
        ${pct!=null ? `
        <div class="rec-analyst-bar">
          <div class="rec-analyst-bg"><div class="rec-analyst-fill" style="width:${pct}%;background:${bCol}"></div></div>
          <div class="rec-analyst-labels">
            <span>↑${upg} ↓${dwn} last 7d</span>
            <span style="color:${bCol};font-weight:700">${pct}% of ${tot} bullish</span>
          </div>
        </div>` : ''}
        ${spark}
        ${thesis ? `<div class="rec-writeup">${thesis}</div>` : ''}
        <div class="rec-actions">
          <a href="${newsUrl}" target="_blank" rel="noopener" class="rec-news-btn buy">📰 Positive analyst news</a>
          <div class="rec-src-links">
            <a href="${SRC.YF(s.ticker)}" target="_blank" rel="noopener">YF</a>
            <a href="${SRC.SA(s.ticker)}" target="_blank" rel="noopener">SA</a>
          </div>
        </div>
      </div>`;
    }

    function buildSellCard(s) {
      const isAvoid = s.signal==='AVOID';
      const price   = s.price!=null ? `$${Number(s.price).toFixed(2)}` : '—';
      const target  = s.analyst_target_price!=null ? `$${Number(s.analyst_target_price).toFixed(0)}` : '—';
      const score   = Math.round(s.composite_score??0);
      const thesis  = sellThesis(s);
      const cmp     = buildCompareTable(s.ticker);
      const newsUrl = getNewsLink(s.ticker, s.signal);
      return `
      <div class="rec-card rec-sell" style="border-left-color:#f85149">
        <div class="rec-card-top">
          <div class="rec-rank-badge" style="color:#f85149">#${s.rank} ${rankMove(s.ticker,s.rank)}</div>
          <div class="rec-signal-badge" style="color:#f85149">🔴 ${isAvoid?'AVOID':'EXIT / TRIM'}</div>
        </div>
        <div class="rec-card-main">
          <div>
            <div class="rec-ticker" style="color:#f85149">${s.ticker}</div>
            <div class="rec-company">${s.company||''}</div>
          </div>
          <div class="rec-price-block">
            <div class="rec-current-price">${price}</div>
            <div class="rec-score-label">Score <strong style="color:#f85149">${score}</strong>/100 &nbsp; Target <strong>${target}</strong></div>
          </div>
        </div>
        ${cmp}
        ${thesis ? `<div class="rec-writeup">${thesis}</div>` : ''}
        <div class="rec-actions">
          <a href="${newsUrl}" target="_blank" rel="noopener" class="rec-news-btn sell">📰 Negative analyst news</a>
          <div class="rec-src-links">
            <a href="${SRC.YF(s.ticker)}" target="_blank" rel="noopener">YF</a>
            <a href="${SRC.SA(s.ticker)}" target="_blank" rel="noopener">SA</a>
          </div>
        </div>
      </div>`;
    }

    const buyHTML  = buys.map(buildBuyCard).join('');
    const sellHTML = sells.length
      ? sells.map(buildSellCard).join('')
      : '<div class="rec-empty">No AVOID signals or overextended stocks in this run.</div>';

    const dt      = new Date(run.run_date+'T12:00:00');
    const dateStr = dt.toLocaleDateString('en-AU',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

    el.innerHTML = `
      <div class="rec-wrap" id="rec-wrap">
        <div class="rec-header">
          <div>
            <div class="rec-header-label">Current Recommendation</div>
            <div class="rec-header-date">${dateStr}</div>
            <div class="rec-header-sub">${run.run_label??'Run'} · ${run.total_stocks} stocks analysed</div>
          </div>
          <button class="rec-dl-btn" id="rec-dl-btn" onclick="downloadRecAsImage()" title="Download as image">⬇</button>
        </div>
        <div class="rec-section-title">🟢 Top Buys</div>
        <div class="rec-list">${buyHTML}</div>
        <div class="rec-section-title" style="margin-top:16px">🔴 Exit / Trim</div>
        <div class="rec-list">${sellHTML}</div>
        <div class="rec-disclaimer">Not financial advice · Data Glimpse Stocks · do your own research before acting.</div>
      </div>`;
  }

  async function downloadRecAsImage() {
    if (typeof html2canvas==='undefined') { alert('Image library not loaded — try refreshing.'); return; }
    const btn = document.getElementById('rec-dl-btn');
    if (btn) { btn.textContent='…'; btn.disabled=true; }
    try {
      const el     = document.getElementById('rec-wrap');
      const canvas = await html2canvas(el, { backgroundColor:'#0d1117', scale:2, useCORS:true, logging:false });
      const latest = allRuns.find(r => r.run_id === lastRunId) ?? [...allRuns].sort((a,b)=>b.run_date.localeCompare(a.run_date))[0];
      const link   = document.createElement('a');
      link.download = `recommendation-${latest?.run_date??'today'}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    } catch(e) {
      alert('Download failed — try a screenshot instead.');
    } finally {
      if (btn) { btn.textContent='⬇'; btn.disabled=false; }
    }
  }

  // ── News & Summary helpers ────────────────────────────────────────────────
  function openSummaryModal() {
    if (!currentRun?.stocks?.length) return;
    const run = currentRun;
    const buys   = run.stocks.filter(s => s.signal === 'STRONG BUY' || s.signal === 'BUY').slice(0, 5);
    const avoids = run.stocks.filter(s => s.signal === 'AVOID').slice(0, 3);

    function summaryRow(s, sentiment) {
      const isBuy   = sentiment === 'buy';
      const color   = isBuy ? (s.signal === 'STRONG BUY' ? '#3fb950' : '#e3b341') : '#f85149';
      const emoji   = isBuy ? (s.signal === 'STRONG BUY' ? '🟢' : '🟡') : '🔴';
      const price   = s.price != null ? `$${Number(s.price).toFixed(2)}` : '—';
      const target  = s.analyst_target_price != null ? `$${Number(s.analyst_target_price).toFixed(0)}` : '—';
      const upside  = s.upside_pct != null ? `${s.upside_pct > 0 ? '+' : ''}${s.upside_pct.toFixed(1)}%` : '';
      const upCls   = (s.upside_pct ?? 0) > 0 ? 'sp-tgt' : 'sp-neg';
      const score   = Math.round(s.composite_score ?? 0);
      const ad      = s.signal_details?.analyst || '';
      const upg     = ad.match(/(\d+)\s+upgrade/i)?.[1] ?? '0';
      const dwn     = ad.match(/(\d+)\s+downgrade/i)?.[1] ?? '0';
      const bull    = ad.match(/(\d+)%\s+of\s+(\d+)\s+analysts/i);
      const thesis  = isBuy
        ? (bull ? `${bull[1]}% of ${bull[2]} analysts bullish · ↑${upg} upgrade${upg!=='1'?'s':''} this week · momentum ${s.scores?.momentum?.toFixed(0) ?? '—'}/100` : `↑${upg} upgrade(s) · analyst score ${s.scores?.analyst?.toFixed(0) ?? '—'}/100`)
        : (bull ? `${bull[1]}% of ${bull[2]} analysts bullish · ↓${dwn} downgrade(s) · score ${score}/100` : `Score ${score}/100 — weak signals across the board`);
      const newsUrl = getNewsLink(s.ticker, s.signal);
      const newsLbl = isBuy ? '📰 Latest positive analyst news →' : '📰 Latest negative analyst news →';
      const newsCls = isBuy ? 'summary-news-link buy' : 'summary-news-link sell';
      return `
        <div class="summary-row">
          <div style="min-width:52px">
            <div class="summary-ticker" style="color:${color}">${s.ticker}</div>
            <div class="summary-score-badge" style="color:${color}">${score}</div>
          </div>
          <div class="summary-meta">
            <div class="summary-signal" style="color:${color}">${emoji} ${s.signal}</div>
            <div class="summary-prices">
              <span class="sp-cur">${price}</span>${isBuy ? ` → <span class="${upCls}">${target}${upside ? ' ('+upside+')' : ''}</span>` : ''}
            </div>
            <div class="summary-thesis">${thesis}</div>
            <a href="${newsUrl}" target="_blank" rel="noopener" class="${newsCls}">${newsLbl}</a>
          </div>
        </div>`;
    }

    const buyHTML   = buys.map(s => summaryRow(s, 'buy')).join('');
    const avoidHTML = avoids.length
      ? avoids.map(s => summaryRow(s, 'avoid')).join('')
      : '<div style="color:var(--muted);font-size:12px;padding:8px 0">No AVOID signals in this run.</div>';

    const dt = new Date(run.run_date + 'T12:00:00');
    const dateStr = dt.toLocaleDateString('en-AU', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

    document.getElementById('sm-label').textContent   = run.run_label || 'Daily Run';
    document.getElementById('sm-date').textContent    = dateStr;
    document.getElementById('sm-content').innerHTML = `
      <div class="summary-section-title">🟢 Strong Buy / Buy</div>
      ${buyHTML}
      <div class="summary-section-title" style="margin-top:16px">🔴 Avoid</div>
      ${avoidHTML}`;
    document.getElementById('summary-overlay').classList.add('open');
  }

  function closeSummaryModal() {
    document.getElementById('summary-overlay').classList.remove('open');
  }
  function closeSummaryOverlay(e) {
    if (e.target === document.getElementById('summary-overlay')) closeSummaryModal();
  }

  async function downloadSummaryAsImage() {
    const btn = document.getElementById('sm-dl-btn');
    const origText = btn.textContent;
    btn.textContent = 'Preparing…';
    btn.disabled = true;
    try {
      const src   = document.getElementById('sm-card');
      const clone = src.cloneNode(true);
      Object.assign(clone.style, {
        position: 'fixed', left: '-9999px', top: '0',
        width: '600px', maxHeight: 'none', overflow: 'visible',
        borderRadius: '18px', background: '#1c2128', zIndex: '-1',
      });
      // Remove button from clone so it doesn't appear in image
      clone.querySelector('#sm-dl-btn')?.remove();
      document.body.appendChild(clone);
      const canvas = await html2canvas(clone, {
        backgroundColor: '#1c2128', scale: 2, useCORS: true, logging: false,
      });
      document.body.removeChild(clone);
      const link = document.createElement('a');
      link.download = `picks-${currentRun?.run_date ?? 'today'}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    } catch(err) {
      console.error(err);
      alert('Image download failed — try a screenshot instead.');
    } finally {
      btn.textContent = origText;
      btn.disabled = false;
    }
  }
</script>

<script>
  // ── 8-K Filing Modal JS ───────────────────────────────────────────────────
  const _FM_BANDS = [
    { min:0,  max:20,  label:'Very negative', color:'#f85149', border:'rgba(248,81,73,0.4)'   },
    { min:20, max:40,  label:'Cautious',       color:'#e3b341', border:'rgba(227,179,65,0.4)'  },
    { min:40, max:60,  label:'Neutral',        color:'#8b949e', border:'rgba(139,148,158,0.4)' },
    { min:60, max:80,  label:'Positive',       color:'#3fb950', border:'rgba(63,185,80,0.4)'   },
    { min:80, max:101, label:'Very positive',  color:'#2ea043', border:'rgba(46,160,67,0.4)'   },
  ];
  function _getFMBand(score) {
    return _FM_BANDS.find(b => score >= b.min && score < b.max) || _FM_BANDS[2];
  }
  function openFilingModal(btn) {
    const score  = parseInt(btn.dataset.score, 10);
    const band   = _getFMBand(score);
    document.getElementById('fm-ticker').textContent = btn.dataset.ticker;
    document.getElementById('fm-score').textContent  = score;
    document.getElementById('fm-band').textContent   = band.label;
    document.getElementById('fm-reason').textContent = btn.dataset.reason;
    document.getElementById('fm-date').textContent   = '📅 ' + btn.dataset.date;
    const circle = document.getElementById('fm-circle');
    circle.style.borderColor = band.border;
    circle.querySelector('span').style.color = band.color;
    document.getElementById('filing-overlay').classList.add('open');
  }
  function closeFilingModal() {
    document.getElementById('filing-overlay').classList.remove('open');
  }
  function closeFilingModalOverlay(e) {
    if (e.target === document.getElementById('filing-overlay')) closeFilingModal();
  }
</script>
