<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="DG Stocks">
  <link rel="manifest" href="dashboard-manifest.json">
  <title>Data Glimpse Stocks</title>

  <!-- PIN gate — must be first script so body is hidden before content renders -->
  <script src="auth.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg:      #0d1117;
      --surface: #161b22;
      --card:    #1c2128;
      --card2:   #21262d;
      --border:  #30363d;
      --green:   #2ea043;
      --green-l: #3fb950;
      --amber:   #d29922;
      --amber-l: #e3b341;
      --red:     #da3633;
      --red-l:   #f85149;
      --muted:   #8b949e;
      --text:    #e6edf3;
      --radius:  12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      min-height: 100vh;
      padding-bottom: calc(env(safe-area-inset-bottom) + 24px);
      overscroll-behavior: none;
    }

    /* ─── Header ─────────────────────────────────────────────── */
    .header {
      background: rgba(22,27,34,0.88);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: calc(14px + env(safe-area-inset-top)) 16px 11px;
      position: sticky;
      top: 0;
      z-index: 30;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .header-left h1 {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.4px;
      color: var(--text);
    }
    .header-left h1 em { color: var(--green-l); font-style: normal; }
    .header-subtitle {
      font-size: 11px;
      color: var(--muted);
      margin-top: 3px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .header-date { text-align: right; flex-shrink: 0; margin-left: 10px; }
    .date-primary   { font-size: 14px; font-weight: 800; color: var(--green-l); letter-spacing: -0.2px; line-height: 1.2; }
    .date-secondary { font-size: 10px; font-weight: 500; color: var(--muted); margin-top: 2px; }

    /* ─── Tab bar — pill style ────────────────────────────────── */
    .tab-bar-wrap {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 8px 10px;
      position: sticky;
      z-index: 29;
    }
    .tab-bar {
      display: flex;
      align-items: center;
      gap: 4px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .tab-bar::-webkit-scrollbar { display: none; }

    .tab-btn {
      flex-shrink: 0;
      padding: 5px 13px;
      font-size: 12px;
      font-weight: 600;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      white-space: nowrap;
      background: transparent;
      color: var(--muted);
      transition: background 0.12s, color 0.12s;
    }
    .tab-btn:active { opacity: 0.6; }
    .tab-btn.active { background: var(--green); color: #fff; }
    .tab-btn.archive { font-size: 11px; }
    .tab-sep { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; margin: 0 3px; }

    /* Dictionary pill */
    .tab-btn.dict        { color: var(--amber-l); }
    .tab-btn.dict.active { background: var(--amber); color: #fff; }

    /* ─── Run meta bar ───────────────────────────────────────── */
    .run-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 14px;
      font-size: 11px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    .run-meta-label { color: var(--green-l); font-weight: 700; }

    /* ─── 2-column stock grid ────────────────────────────────── */
    .stock-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 9px;
      padding: 10px 9px 6px;
    }

    /* Card — left border strip per signal */
    .stock-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-left: 4px solid transparent;
      border-radius: var(--radius);
      padding: 10px 10px 8px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 0;
      transition: background 0.1s, opacity 0.1s;
      -webkit-user-select: none;
      user-select: none;
      position: relative;
    }
    .stock-card:active { background: var(--card2); opacity: 0.85; }

    /* ── Card internals ── */
    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    .card-rank {
      font-size: 9px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.2px;
    }
    .card-upside-badge {
      font-size: 9.5px;
      font-weight: 800;
      padding: 2px 6px;
      border-radius: 4px;
    }

    .card-ticker {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -0.8px;
      line-height: 1;
      margin-bottom: 2px;
      color: var(--text);
    }

    .card-signal {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.2px;
      margin-bottom: 8px;
      line-height: 1;
    }

    /* Score bar — thin strip above score row */
    .score-bar-bg {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      margin-bottom: 8px;
      overflow: hidden;
    }
    .score-bar-fill { height: 100%; border-radius: 2px; }

    /* Score + current price — same row, same colour, 24px */
    .card-score-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 4px;
    }
    .score-left       { display: flex; align-items: flex-end; gap: 5px; }
    .card-score       { font-size: 24px; font-weight: 900; letter-spacing: -1px; line-height: 1; }
    .card-score-label { font-size: 9px; color: var(--muted); font-weight: 600; margin-bottom: 2px; }
    .card-price-now   { font-size: 24px; font-weight: 900; letter-spacing: -1px; line-height: 1; }

    /* Target + stop row */
    .card-price {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 7px;
      letter-spacing: -0.1px;
    }
    .card-price .tv { color: var(--text); font-weight: 700; }
    .card-price .stop-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
    }
    .card-price .stop-value {
      font-size: 11px;
      font-weight: 800;
      color: var(--red-l);
    }

    /* ── Analyst summary section ────────────────────────── */
    .card-analyst {
      border-top: 1px solid var(--border);
      padding-top: 6px;
      margin-top: 4px;
      margin-bottom: 6px;
    }

    .analyst-moves {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 5px;
    }
    .analyst-up   { font-size: 13px; font-weight: 800; color: var(--green-l); letter-spacing: -0.2px; }
    .analyst-down { font-size: 13px; font-weight: 800; color: var(--red-l);   letter-spacing: -0.2px; }
    .analyst-period {
      font-size: 9px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .bullish-bar-bg {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 4px;
    }
    .bullish-bar-fill { height: 100%; border-radius: 2px; }

    .analyst-caption {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 9.5px;
      font-weight: 600;
      color: var(--muted);
      line-height: 1;
    }
    .analyst-caption .bullish-pct { font-weight: 800; font-size: 10px; }

    /* ── Source link buttons ── */
    .card-sources {
      display: flex;
      gap: 3px;
      margin-top: auto;
      padding-top: 6px;
      border-top: 1px solid var(--border);
    }
    .card-sources a {
      flex: 1;
      text-align: center;
      font-size: 8px;
      font-weight: 800;
      color: var(--muted);
      padding: 4px 2px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 4px;
      text-decoration: none;
      letter-spacing: 0.3px;
      line-height: 1;
    }
    .card-sources a:active { background: rgba(255,255,255,0.1); color: var(--text); }

    /* ─── Legend + Filter row ────────────────────────────────── */
    .legend-row {
      display: flex;
      align-items: center;
      padding: 7px 10px 6px;
      border-bottom: 1px solid var(--border);
      gap: 8px;
    }
    .legend-items {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      flex: 1;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 9px;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0.3px;
    }
    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* ── Filter toggle button ── */
    .filter-btn {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 5px;
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 10px 4px 8px;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
    }
    .filter-btn.active {
      background: rgba(63,185,80,0.12);
      border-color: rgba(63,185,80,0.4);
      color: var(--green-l);
    }

    /* ─── Filter panel ───────────────────────────────────────── */
    .filter-panel {
      background: var(--surface);
      border-bottom: 2px solid var(--border);
      padding: 10px 12px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .filter-panel.hidden { display: none; }

    .filter-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .filter-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      min-width: 52px;
      flex-shrink: 0;
    }
    .filter-search {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 10px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      outline: none;
      -webkit-appearance: none;
    }
    .filter-search:focus { border-color: var(--green-l); }
    .filter-search::placeholder { color: var(--muted); font-weight: 400; }

    .filter-range {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 1;
    }
    .range-input {
      flex: 1;
      min-width: 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 8px;
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      text-align: center;
      outline: none;
      -webkit-appearance: none;
    }
    .range-input:focus { border-color: var(--green-l); }
    .range-input::placeholder { color: var(--muted); font-weight: 400; font-size: 12px; }
    .range-dash { font-size: 12px; color: var(--muted); font-weight: 700; flex-shrink: 0; }

    .filter-clear-btn {
      align-self: flex-end;
      margin-top: 2px;
      padding: 5px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
    }
    .filter-clear-btn.has-filters {
      border-color: rgba(248,81,73,0.4);
      background: rgba(248,81,73,0.08);
      color: var(--red-l);
    }

    /* ─── Result count bar ───────────────────────────────────── */
    .result-bar {
      padding: 5px 12px;
      font-size: 10px;
      font-weight: 700;
      color: var(--green-l);
      border-bottom: 1px solid var(--border);
      background: rgba(63,185,80,0.06);
      display: none;
    }
    .result-bar.visible { display: block; }

    /* ── Trend toggle pill (1M / 3M) ────────────────────────── */
    .trend-toggle {
      display: flex;
      align-items: center;
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2px;
      flex-shrink: 0;
    }
    .trend-opt {
      padding: 3px 10px;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      border-radius: 18px;
      border: none;
      background: transparent;
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
      white-space: nowrap;
    }
    .trend-opt.active { background: var(--green); color: #fff; }

    /* ── Sparkline ───────────────────────────────────────────── */
    .sparkline-wrap {
      margin-bottom: 7px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .sparkline-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .sparkline-label {
      font-size: 8.5px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .sparkline-return {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: -0.2px;
    }
    .sparkline-svg {
      width: 100%;
      height: 28px;
      display: block;
      overflow: visible;
    }

    /* ─── No-results empty state ─────────────────────────────── */
    .no-results {
      grid-column: 1 / -1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      gap: 10px;
      color: var(--muted);
      text-align: center;
    }
    .no-results-icon { font-size: 32px; }
    .no-results-text { font-size: 13px; line-height: 1.6; }
    .no-results-clear {
      margin-top: 4px;
      padding: 7px 18px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    /* ─── States ─────────────────────────────────────────────── */
    .state-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 24px;
      color: var(--muted);
      gap: 14px;
      text-align: center;
    }
    .state-box p { font-size: 14px; line-height: 1.7; }

    .spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--green-l);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green-l);
      animation: pulse 2.4s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }

    /* ─── Dictionary content wrapper ────────────────────────── */
    .dict-wrap {
      max-width: 640px;
      margin: 0 auto;
      padding: 20px 14px 48px;
    }
    .dict-section {
      margin-bottom: 0;
      padding-top: 22px;
      border-top: 1px solid var(--border);
    }
    .dict-section:first-child { border-top: none; padding-top: 0; }
    .dict-section-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.8px;
      text-transform: uppercase; color: var(--muted); margin-bottom: 8px;
    }
    .dict-h2 {
      font-size: 17px; font-weight: 800; letter-spacing: -0.3px;
      color: var(--text); margin-bottom: 8px;
    }
    .dict-p {
      font-size: 13px; color: var(--muted); line-height: 1.7; margin-bottom: 8px;
    }

    /* Card + callout side-by-side */
    .dict-card-stage {
      display: flex; gap: 12px; align-items: flex-start; margin: 14px 0 20px;
    }
    .dict-card-stage .stock-card {
      width: 162px; flex-shrink: 0; cursor: default; pointer-events: none;
    }
    .dict-callout-list {
      flex: 1; display: flex; flex-direction: column; gap: 7px; padding-top: 2px;
    }
    .dict-callout-item {
      display: flex; align-items: flex-start; gap: 7px;
      font-size: 11.5px; line-height: 1.4;
    }
    .dict-callout-num {
      width: 19px; height: 19px; border-radius: 50%;
      background: var(--muted); color: var(--bg);
      font-size: 9.5px; font-weight: 800;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .dict-callout-text { color: var(--muted); }
    .dict-callout-text strong { color: var(--text); font-weight: 700; }

    /* Metric breakdown table */
    .dict-table {
      width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 12.5px;
    }
    .dict-table th {
      text-align: left; font-size: 10px; font-weight: 700; letter-spacing: 0.5px;
      text-transform: uppercase; color: var(--muted);
      border-bottom: 2px solid var(--border); padding: 5px 8px;
    }
    .dict-table td {
      padding: 9px 8px; border-bottom: 1px solid var(--border); vertical-align: top;
    }
    .dict-table tr:last-child td { border-bottom: none; }
    .dict-table td:first-child { font-weight: 700; color: var(--text); width: 36%; }
    .dict-table td:last-child { color: var(--muted); line-height: 1.5; }

    /* Metric value chips — dark theme */
    .mv   { display:inline-block; background:var(--card2); border:1px solid var(--border); border-radius:4px; padding:1px 6px; font-family:monospace; font-size:11px; font-weight:700; color:var(--text); margin-bottom:2px; }
    .mv.g { background:rgba(46,160,67,0.15); border-color:rgba(63,185,80,0.3); color:#3fb950; }
    .mv.r { background:rgba(218,54,51,0.15); border-color:rgba(248,81,73,0.3); color:#f85149; }
    .mv.a { background:rgba(210,153,34,0.15); border-color:rgba(227,179,65,0.3); color:#e3b341; }

    /* Signal grid */
    .dict-signal-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px;
    }
    .dict-signal-item {
      background: var(--card); border: 1px solid var(--border);
      border-left: 4px solid; border-radius: 8px; padding: 10px;
    }
    .dict-signal-label { font-size: 11px; font-weight: 800; letter-spacing: 0.3px; margin-bottom: 2px; }
    .dict-signal-desc  { font-size: 11px; color: var(--muted); line-height: 1.4; }

    /* Run schedule grid */
    .dict-run-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px;
    }
    .dict-run-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px;
    }
    .dict-run-card h4 { font-size: 12px; font-weight: 800; color: var(--text); margin-bottom: 3px; }
    .dict-run-card p  { font-size: 11px; color: var(--muted); line-height: 1.5; }

    /* Setup steps */
    .dict-steps { margin-top: 12px; }
    .dict-step  { display: flex; gap: 10px; margin-bottom: 12px; align-items: flex-start; }
    .dict-step-num {
      width: 25px; height: 25px; border-radius: 50%;
      background: var(--card2); border: 2px solid var(--border);
      color: var(--text); font-size: 12px; font-weight: 800;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .dict-step-title { font-size: 13px; font-weight: 700; color: var(--text); display: block; margin-bottom: 1px; }
    .dict-step-desc  { font-size: 12px; color: var(--muted); }
    .dict-step-url   {
      display: inline-block; font-family: monospace; font-size: 10.5px;
      background: var(--card2); border: 1px solid var(--border);
      border-radius: 4px; padding: 2px 7px; margin-top: 3px;
      color: var(--text); word-break: break-all;
    }

    /* Disclaimer — dark amber */
    .dict-disclaimer {
      background: rgba(210,153,34,0.1); border: 1px solid rgba(227,179,65,0.25); border-radius: 8px;
      padding: 12px 14px; margin-top: 12px;
      font-size: 11.5px; color: var(--amber-l); line-height: 1.6;
    }
  </style>
</head>
<body>

  <!-- ── Header ──────────────────────────────────────────────── -->
  <div class="header" id="header">
    <div class="header-left">
      <h1>📈 Data Glimpse <em>Stocks</em></h1>
      <div class="header-subtitle">
        <span class="dot"></span>
        <span id="subtitle-text">Loading…</span>
      </div>
    </div>
    <div class="header-date">
      <div class="date-primary"   id="date-primary">—</div>
      <div class="date-secondary" id="date-secondary">—</div>
    </div>
  </div>

  <!-- ── Tab bar ─────────────────────────────────────────────── -->
  <div class="tab-bar-wrap" id="tab-bar-wrap">
    <div class="tab-bar" id="tab-bar">
      <div style="padding:11px 8px;color:var(--muted);font-size:11px">Loading…</div>
    </div>
  </div>

  <!-- ── Content ─────────────────────────────────────────────── -->
  <div id="content">
    <div class="state-box">
      <div class="spinner"></div>
      <p>Fetching stock picks…</p>
    </div>
  </div>


<script>
  // ── Config ──────────────────────────────────────────────────────────────
  const DATA_URL      = 'https://raw.githubusercontent.com/karthikpalsg/stock-recommender/main/data/history.json';
  const POLL_INTERVAL = 5 * 60 * 1000;  // poll every 5 min

  // External source URLs per ticker
  const SRC = {
    YF:   t => `https://finance.yahoo.com/quote/${t}`,           // price, news, analyst ratings, financials
    FV:   t => `https://finviz.com/quote.ashx?t=${t}`,           // chart, ratios, insider trades, news
    SA:   t => `https://seekingalpha.com/symbol/${t}`,           // analyst articles & buy/sell ratings
  };

  // Signal → accent colour
  const SIG_COLOR = {
    'STRONG BUY': 'var(--green-l)',
    'BUY':        'var(--amber-l)',
    'WATCH':      'var(--muted)',
    'AVOID':      'var(--red-l)',
  };
  // Raw hex values for border-left (CSS variables don't work in inline border shorthand on older WebKit)
  const SIG_HEX = {
    'STRONG BUY': '#3fb950',
    'BUY':        '#e3b341',
    'WATCH':      '#8b949e',
    'AVOID':      '#f85149',
  };
  // Local emoji map — ignores signal_emoji from data (which sometimes contains full label text)
  const SIG_EMOJI = {
    'STRONG BUY': '🟢',
    'BUY':        '🟡',
    'WATCH':      '⚪',
    'AVOID':      '🔴',
  };

  // ── State ───────────────────────────────────────────────────────────────
  let allRuns     = [];
  let tabMeta     = [];
  let activeTabId = null;
  let lastRunId   = null;
  let lastFetchAt = null;
  let currentRun  = null;   // run currently displayed
  let filterOpen  = false;  // filter panel visibility
  let trendMode   = '1m';   // sparkline window: '1m' | '3m'

  // ── Boot ────────────────────────────────────────────────────────────────
  window.addEventListener('load', () => {
    positionTabBar();
    new ResizeObserver(positionTabBar).observe(document.getElementById('header'));
    fetchData();
    setInterval(fetchData,      POLL_INTERVAL);
    setInterval(updateSubtitle, 30_000);
  });

  function positionTabBar() {
    document.getElementById('tab-bar-wrap').style.top =
      document.getElementById('header').offsetHeight + 'px';
  }

  // ── Fetch ────────────────────────────────────────────────────────────────
  async function fetchData() {
    try {
      const res  = await fetch(DATA_URL + '?_=' + Date.now());
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      lastFetchAt = Date.now();
      allRuns     = (data.runs || []).slice();

      if (data.last_run !== lastRunId) {
        lastRunId = data.last_run;
        buildUI();
      }
      updateSubtitle();
    } catch (e) {
      setSubtitleText('Could not load — check connection');
    }
  }

  // ── Week boundary ────────────────────────────────────────────────────────
  function getMondayDateStr() {
    const syd = new Date().toLocaleDateString('en-CA', { timeZone: 'Australia/Sydney' });
    const [y, m, d] = syd.split('-').map(Number);
    const dt  = new Date(y, m - 1, d);
    const dow = dt.getDay();
    dt.setDate(dt.getDate() + (dow === 0 ? -6 : 1 - dow));
    return dt.toLocaleDateString('en-CA');
  }

  // ── Build tabs + content ──────────────────────────────────────────────────
  function buildUI() {
    if (!allRuns.length) {
      showEmpty('No runs yet. The engine runs automatically at 5am and 7am Sydney time on weekdays.');
      return;
    }

    const monday    = getMondayDateStr();
    const weekRuns  = [];
    const monthBest = {};

    allRuns.forEach(run => {
      if (run.run_date >= monday) {
        weekRuns.push(run);
      } else {
        const mk = run.run_date.slice(0, 7);
        if (!monthBest[mk] || run.run_id > monthBest[mk].run_id) monthBest[mk] = run;
      }
    });

    weekRuns.sort((a, b) => (b.run_id > a.run_id ? 1 : -1));
    const archiveKeys = Object.keys(monthBest).sort().reverse();
    buildTabs(weekRuns, archiveKeys, monthBest);
  }

  // ── Tabs ──────────────────────────────────────────────────────────────────
  function buildTabs(weekRuns, archiveKeys, monthBest) {
    tabMeta = [];

    weekRuns.forEach(run => {
      const day  = dayName(run.run_date);
      const time = runTimeLabel(run);
      tabMeta.push({ id: 'w-' + run.run_id, label: day + ' ' + time, run, type: 'week' });
    });

    archiveKeys.forEach(mk => {
      const [y, m] = mk.split('-');
      const label  = new Date(Number(y), Number(m) - 1)
                       .toLocaleDateString('en-AU', { month: 'short', year: '2-digit' });
      tabMeta.push({ id: 'a-' + mk, label, run: monthBest[mk], type: 'archive', monthKey: mk });
    });

    const bar = document.getElementById('tab-bar');
    bar.innerHTML = '';
    tabMeta.forEach((tab, i) => {
      if (i > 0 && tab.type === 'archive' && tabMeta[i-1].type === 'week') {
        const sep = document.createElement('div');
        sep.className = 'tab-sep';
        bar.appendChild(sep);
      }
      const btn = document.createElement('button');
      btn.className = 'tab-btn' + (tab.type === 'archive' ? ' archive' : '');
      btn.dataset.id = tab.id;
      btn.textContent = tab.label;
      btn.onclick = () => selectTab(tab.id);
      bar.appendChild(btn);
    });

    // Always append Dictionary tab at the far right
    const dictSep = document.createElement('div');
    dictSep.className = 'tab-sep';
    bar.appendChild(dictSep);
    const dictBtn = document.createElement('button');
    dictBtn.className = 'tab-btn dict';
    dictBtn.dataset.id = 'dictionary';
    dictBtn.textContent = '📖 Dictionary';
    dictBtn.onclick = () => selectTab('dictionary');
    bar.appendChild(dictBtn);
    tabMeta.push({ id: 'dictionary', label: '📖 Dictionary', type: 'dictionary' });

    // Restore active tab — but never auto-restore to Dictionary on data refresh
    const restore = (activeTabId && activeTabId !== 'dictionary' && tabMeta.find(t => t.id === activeTabId))
                    ? activeTabId : tabMeta[0]?.id;
    if (restore) selectTab(restore);
  }

  function selectTab(id) {
    const tab = tabMeta.find(t => t.id === id);
    if (!tab) return;
    activeTabId = id;

    document.querySelectorAll('.tab-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.id === id)
    );

    const btn = document.querySelector(`.tab-btn[data-id="${id}"]`);
    btn?.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });

    updateHeaderDate(tab);
    if (tab.type === 'dictionary') {
      renderDictionary();
    } else {
      renderRun(tab.run);
    }
  }

  // ── Header date ───────────────────────────────────────────────────────────
  function updateHeaderDate(tab) {
    const p = document.getElementById('date-primary');
    const s = document.getElementById('date-secondary');

    if (tab.type === 'dictionary') {
      p.textContent = '📖 Dictionary';
      s.textContent = 'How to read your picks';
    } else if (tab.type === 'archive') {
      const [y, m] = tab.monthKey.split('-');
      const dt = new Date(Number(y), Number(m) - 1);
      p.textContent = dt.toLocaleDateString('en-AU', { month: 'long', year: 'numeric' });
      s.textContent = 'Monthly Archive';
    } else {
      const dt = new Date(tab.run.run_date + 'T12:00:00');
      p.textContent = dt.toLocaleDateString('en-AU', { weekday: 'long', day: 'numeric', month: 'long' });
      s.textContent = tab.run.run_label || tab.run.run_time?.slice(0, 5) || '';
    }
  }

  // ── Render 3-column grid ──────────────────────────────────────────────────
  function renderRun(run) {
    const el = document.getElementById('content');
    if (!run?.stocks?.length) {
      el.innerHTML = '<div class="state-box"><p>No stock data for this run.</p></div>';
      return;
    }

    currentRun = run;
    filterOpen = false;

    el.innerHTML = `
      <div class="run-meta">
        <span>${run.total_stocks} stocks &middot; ${run.run_date}</span>
        <span class="run-meta-label">${run.run_label ?? 'Run'}</span>
      </div>
      <div class="legend-row">
        <div class="legend-items">
          <div class="legend-item"><div class="legend-dot" style="background:#3fb950"></div>STRONG BUY</div>
          <div class="legend-item"><div class="legend-dot" style="background:#e3b341"></div>BUY</div>
          <div class="legend-item"><div class="legend-dot" style="background:#8b949e"></div>WATCH</div>
          <div class="legend-item"><div class="legend-dot" style="background:#f85149"></div>AVOID</div>
        </div>
        <div class="trend-toggle">
          <button class="trend-opt ${trendMode==='1m'?'active':''}" id="trend-1m" onclick="setTrend('1m')">1M</button>
          <button class="trend-opt ${trendMode==='3m'?'active':''}" id="trend-3m" onclick="setTrend('3m')">3M</button>
        </div>
        <button class="filter-btn" id="filter-btn" onclick="toggleFilter()">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor">
            <path d="M1 2.5A1.5 1.5 0 0 1 2.5 1h11A1.5 1.5 0 0 1 15 2.5v1.586a1.5 1.5 0 0 1-.44 1.06L9.5 10.207V14.5a.5.5 0 0 1-.777.416L5.723 13A.5.5 0 0 1 5.5 12.582V10.207L1.44 5.146A1.5 1.5 0 0 1 1 4.086V2.5z"/>
          </svg>
          Filter
        </button>
      </div>
      <div class="filter-panel hidden" id="filter-panel">
        <div class="filter-row">
          <span class="filter-label">Ticker</span>
          <input class="filter-search" id="f-ticker" type="text"
                 placeholder="e.g. DDOG, NVDA" autocomplete="off" autocapitalize="characters"
                 oninput="this.value=this.value.toUpperCase(); applyFilters()">
        </div>
        <div class="filter-row">
          <span class="filter-label">Price $</span>
          <div class="filter-range">
            <input class="range-input" id="f-price-min" type="number"
                   placeholder="Min" min="0" oninput="applyFilters()">
            <span class="range-dash">—</span>
            <input class="range-input" id="f-price-max" type="number"
                   placeholder="Max" min="0" oninput="applyFilters()">
          </div>
        </div>
        <button class="filter-clear-btn" id="clear-btn" onclick="clearFilters()">Clear filters</button>
      </div>
      <div class="result-bar" id="result-bar"></div>
      <div class="stock-grid" id="stock-grid"></div>`;

    applyFilters();
  }

  // Opens Yahoo Finance (primary action — whole card tap)
  function openStock(ticker) {
    window.open(SRC.YF(ticker), '_blank', 'noopener');
  }

  // ── Filter ────────────────────────────────────────────────────────────────
  function toggleFilter() {
    filterOpen = !filterOpen;
    document.getElementById('filter-panel')?.classList.toggle('hidden', !filterOpen);
    document.getElementById('filter-btn')?.classList.toggle('active', filterOpen);
  }

  function applyFilters() {
    if (!currentRun?.stocks?.length) return;

    const rawTicker = (document.getElementById('f-ticker')?.value || '').toUpperCase();
    const tickers   = rawTicker.split(/[\s,]+/).map(t => t.trim()).filter(Boolean);
    const priceMin  = parseFloat(document.getElementById('f-price-min')?.value) || 0;
    const priceMax  = parseFloat(document.getElementById('f-price-max')?.value) || Infinity;
    const hasFilter = tickers.length > 0 || priceMin > 0 || priceMax < Infinity;

    // Highlight clear button when filters are set
    document.getElementById('clear-btn')?.classList.toggle('has-filters', hasFilter);

    const stocks = hasFilter
      ? currentRun.stocks.filter(s => {
          if (tickers.length > 0 && !tickers.includes(s.ticker)) return false;
          if (s.price != null && (s.price < priceMin || s.price > priceMax)) return false;
          return true;
        })
      : currentRun.stocks;

    // Result bar
    const rb = document.getElementById('result-bar');
    if (rb) {
      if (hasFilter) {
        rb.textContent = `Showing ${stocks.length} of ${currentRun.stocks.length} stocks`;
        rb.classList.add('visible');
      } else {
        rb.classList.remove('visible');
      }
    }

    renderGrid(stocks, hasFilter);
  }

  function clearFilters() {
    const t = document.getElementById('f-ticker');
    const mn = document.getElementById('f-price-min');
    const mx = document.getElementById('f-price-max');
    if (t)  t.value  = '';
    if (mn) mn.value = '';
    if (mx) mx.value = '';
    applyFilters();
  }

  // ── Trend toggle ─────────────────────────────────────────────────────────
  function setTrend(mode) {
    trendMode = mode;
    document.getElementById('trend-1m')?.classList.toggle('active', mode === '1m');
    document.getElementById('trend-3m')?.classList.toggle('active', mode === '3m');
    applyFilters();  // re-render all cards with new sparkline window
  }

  // ── Build SVG sparkline from a price array ────────────────────────────────
  function buildSparkline(prices) {
    if (!prices || prices.length < 2) return '';
    const W = 200, H = 28;
    const min   = Math.min(...prices);
    const max   = Math.max(...prices);
    const range = max - min || 1;
    const n     = prices.length;
    const isUp  = prices[n - 1] >= prices[0];
    const line  = isUp ? '#3fb950' : '#f85149';
    const fill  = isUp ? 'rgba(63,185,80,0.08)' : 'rgba(248,81,73,0.08)';

    const pts = prices.map((p, i) => [
      (i / (n - 1)) * W,
      H - ((p - min) / range) * (H - 4) - 2
    ]);

    const poly = pts.map(([x, y]) => `${x.toFixed(1)},${y.toFixed(1)}`).join(' ');
    const area = [
      `M ${pts[0][0].toFixed(1)},${H}`,
      ...pts.map(([x, y]) => `L ${x.toFixed(1)},${y.toFixed(1)}`),
      `L ${pts[n-1][0].toFixed(1)},${H}`, 'Z'
    ].join(' ');
    const [lx, ly] = pts[n - 1];

    const ret    = ((prices[n-1] - prices[0]) / prices[0] * 100);
    const retStr = `${ret >= 0 ? '+' : ''}${ret.toFixed(1)}%`;
    const label  = trendMode === '1m' ? '1 month' : '3 months';

    return `
      <div class="sparkline-wrap">
        <div class="sparkline-header">
          <span class="sparkline-label">${label}</span>
          <span class="sparkline-return" style="color:${line}">${retStr}</span>
        </div>
        <svg class="sparkline-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
          <path d="${area}" fill="${fill}" />
          <polyline points="${poly}" fill="none" stroke="${line}"
            stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
          <circle cx="${lx.toFixed(1)}" cy="${ly.toFixed(1)}" r="2.5" fill="${line}" />
        </svg>
      </div>`;
  }

  // ── Build card HTML for a single stock ───────────────────────────────────
  function buildCard(s) {
    const color  = SIG_COLOR[s.signal] || 'var(--muted)';
    const hex    = SIG_HEX[s.signal]   || '#8b949e';
    const score  = Math.round(s.composite_score ?? 0);
    const up     = s.upside_pct != null;
    const upside = up ? `${s.upside_pct > 0 ? '+' : ''}${s.upside_pct.toFixed(1)}%` : '—';
    const badgeStyle = !up
      ? 'background:rgba(255,255,255,0.05);color:var(--muted)'
      : s.upside_pct > 0
        ? 'background:rgba(63,185,80,0.15);color:#3fb950'
        : 'background:rgba(248,81,73,0.15);color:#f85149';
    const price  = s.price != null ? `$${Number(s.price).toFixed(2)}` : '—';
    const target = s.analyst_target_price != null ? `$${Number(s.analyst_target_price).toFixed(0)}` : '—';
    const stop   = s.stop_loss_price != null ? `$${Number(s.stop_loss_price).toFixed(2)}` : '—';

    return `
      <div class="stock-card"
           style="border-left-color:${hex}"
           onclick="openStock('${s.ticker}')">
        <div class="card-top">
          <span class="card-rank">#${s.rank}</span>
          <span class="card-upside-badge" style="${badgeStyle}">${upside}</span>
        </div>
        <div class="card-ticker">${s.ticker}</div>
        <div class="card-signal" style="color:${color}">${SIG_EMOJI[s.signal] ?? ''} ${s.signal}</div>
        <div class="score-bar-bg">
          <div class="score-bar-fill" style="width:${score}%;background:${hex}"></div>
        </div>
        <div class="card-score-row">
          <div class="score-left">
            <span class="card-score" style="color:${color}">${score}</span>
            <span class="card-score-label">/ 100</span>
          </div>
          <span class="card-price-now" style="color:${color}">${price}</span>
        </div>
        <div class="card-price">→ <span class="tv">${target}</span> &nbsp; <span class="stop-label">Stop </span><span class="stop-value">${stop}</span></div>
        ${buildSparkline(trendMode === '1m' ? s.prices_1m : s.prices_3m)}
        ${analystHTML(s.signal_details?.analyst)}
        <div class="card-sources" onclick="event.stopPropagation()">
          <a href="${SRC.YF(s.ticker)}" target="_blank" rel="noopener" title="Yahoo Finance">YF</a>
          <a href="${SRC.FV(s.ticker)}" target="_blank" rel="noopener" title="Finviz">FV</a>
          <a href="${SRC.SA(s.ticker)}" target="_blank" rel="noopener" title="Seeking Alpha">SA</a>
        </div>
      </div>`;
  }

  // ── Render filtered grid into #stock-grid ─────────────────────────────────
  function renderGrid(stocks, filtered) {
    const grid = document.getElementById('stock-grid');
    if (!grid) return;

    if (filtered && stocks.length === 0) {
      grid.innerHTML = `
        <div class="no-results">
          <div class="no-results-icon">🔍</div>
          <div class="no-results-text">No stocks match your filter.<br>Try a different ticker or price range.</div>
          <button class="no-results-clear" onclick="clearFilters()">Clear filters</button>
        </div>`;
      return;
    }

    grid.innerHTML = stocks.map(buildCard).join('');
  }

  // ── Analyst summary parser ────────────────────────────────────────────────
  // Parses the stored signal_details.analyst string, e.g.:
  //   "5 upgrade(s), 0 downgrade(s) in last 7d | 93% of 71 analysts bullish"
  function parseAnalyst(detail) {
    if (!detail) return null;
    const up    = detail.match(/(\d+)\s+upgrade/i);
    const down  = detail.match(/(\d+)\s+downgrade/i);
    const bull  = detail.match(/(\d+)%\s+of\s+(\d+)\s+analysts/i);
    return {
      upgrades:      up   ? parseInt(up[1])   : 0,
      downgrades:    down ? parseInt(down[1]) : 0,
      bullishPct:    bull ? parseInt(bull[1]) : null,
      totalAnalysts: bull ? parseInt(bull[2]) : null,
    };
  }

  // Build the analyst summary HTML block for a card
  function analystHTML(detail) {
    const a = parseAnalyst(detail);
    if (!a) return '';

    // Bar colour: green ≥60%, amber 40–59%, red <40%
    const pct   = a.bullishPct;
    const bCol  = pct == null  ? '#8b949e'
                : pct >= 60    ? '#3fb950'
                : pct >= 40    ? '#e3b341'
                :                '#f85149';

    const barHTML = pct != null
      ? `<div class="bullish-bar-bg">
           <div class="bullish-bar-fill" style="width:${pct}%;background:${bCol}"></div>
         </div>
         <div class="analyst-caption">
           <span>${a.totalAnalysts ? a.totalAnalysts + ' analysts' : 'analysts'}</span>
           <span class="bullish-pct" style="color:${bCol}">${pct}% bullish</span>
         </div>`
      : `<div class="analyst-caption">
           <span style="color:var(--muted)">No consensus data</span>
         </div>`;

    return `
      <div class="card-analyst">
        <div class="analyst-moves">
          <span class="analyst-up">↑${a.upgrades}</span>
          <span class="analyst-period">last 7d</span>
          <span class="analyst-down">↓${a.downgrades}</span>
        </div>
        ${barHTML}
      </div>`;
  }

  // ── Helpers ───────────────────────────────────────────────────────────────
  function dayName(dateStr) {
    return new Date(dateStr + 'T12:00:00')
             .toLocaleDateString('en-AU', { weekday: 'short' });
  }

  function runTimeLabel(run) {
    const lbl = run.run_label || '';
    if (lbl.includes('5am')) return '5am';
    if (lbl.includes('7am')) return '7am';
    return run.run_time?.slice(0, 5) || '';
  }

  function showEmpty(msg) {
    // Even on empty state, render tabs with Dictionary available
    const bar = document.getElementById('tab-bar');
    bar.innerHTML = '';
    const dictBtn = document.createElement('button');
    dictBtn.className = 'tab-btn dict';
    dictBtn.dataset.id = 'dictionary';
    dictBtn.textContent = '📖 Dictionary';
    dictBtn.onclick = () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.id === 'dictionary'));
      document.getElementById('date-primary').textContent   = '📖 Dictionary';
      document.getElementById('date-secondary').textContent = 'How to read your picks';
      renderDictionary();
    };
    bar.appendChild(dictBtn);
    document.getElementById('content').innerHTML =
      `<div class="state-box"><p>${msg}</p></div>`;
  }

  function setSubtitleText(t) { document.getElementById('subtitle-text').textContent = t; }

  function updateSubtitle() {
    if (!lastFetchAt) return;
    const mins = Math.round((Date.now() - lastFetchAt) / 60_000);
    setSubtitleText(
      mins < 1   ? 'Updated just now' :
      mins === 1 ? 'Updated 1 min ago' :
                  `Updated ${mins} min ago`
    );
  }

  // ── Dictionary ────────────────────────────────────────────────────────────
  function renderDictionary() {
    document.getElementById('content').innerHTML = `
<div class="dict-wrap">

  <!-- Section 1: Card visual -->
  <div class="dict-section" style="border-top:none;padding-top:0">
    <div class="dict-section-label">Section 1</div>
    <h2 class="dict-h2">What a stock card looks like</h2>
    <p class="dict-p">Every stock is shown as a card. Here's the NVDA (NVIDIA) card from the 16 May 2026 morning run — the coloured strip on the left shows the signal at a glance. Each part is numbered so you can follow along below.</p>

    <div class="dict-card-stage">
      <!-- NVDA card — reuses existing dashboard card CSS -->
      <div class="stock-card" style="border-left-color:#3fb950;width:162px;cursor:default;pointer-events:none">
        <div class="card-top">
          <span class="card-rank">#1</span>
          <span class="card-upside-badge" style="background:rgba(63,185,80,0.15);color:#3fb950">+21.1%</span>
        </div>
        <div class="card-ticker">NVDA</div>
        <div class="card-signal" style="color:#3fb950">🟢 STRONG BUY</div>
        <div class="score-bar-bg"><div class="score-bar-fill" style="width:80%;background:#3fb950"></div></div>
        <div class="card-score-row">
          <div class="score-left">
            <span class="card-score" style="color:#3fb950">80</span>
            <span class="card-score-label">/ 100</span>
          </div>
          <span class="card-price-now" style="color:#3fb950">$225.32</span>
        </div>
        <div class="card-price">→ <span class="tv">$273</span> &nbsp; <span class="stop-label">Stop </span><span class="stop-value">$207.29</span></div>
        <div class="card-analyst">
          <div class="analyst-moves">
            <span class="analyst-up">↑5</span>
            <span class="analyst-period">last 7d</span>
